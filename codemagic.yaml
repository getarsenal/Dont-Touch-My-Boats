# =====================================================================
# DON'T TOUCH MY BOATS - iOS TestFlight pipeline
# =====================================================================
workflows:
  ios-workflow:
    name: DTMB iOS Build
    integrations:
      app_store_connect: Scheidel Holdings LLC

    environment:
      xcode: latest
      node: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.scheidelholdings.dontouchmyboats

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install dependencies
        script: |
          npm install

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Apply code signing profiles
        script: |
          xcode-project use-profiles

      - name: Set build number from timestamp
        # Apple requires each upload to have a higher CFBundleVersion than the
        # previous upload. Using a timestamp guarantees this: every build gets
        # a number larger than the last, automatically, with no need to query
        # App Store Connect (which was returning stale "0" results).
        #
        # Format: YYYYMMDDHHMM (12 digits). Each build is naturally chronological.
        # Apple accepts integer build numbers up to 2^31-1 = 2147483647, so this
        # format is safe through year 2147.
        #
        # Marketing version (the "1.0" the user sees in App Store) is set
        # separately in the Xcode project — agvtool's `new-version` only
        # touches CFBundleVersion, not CFBundleShortVersionString.
        script: |
          cd $CM_BUILD_DIR/ios/App
          BUILD_NUMBER=$(date +%Y%m%d%H%M)
          echo "Setting build number to $BUILD_NUMBER"
          agvtool new-version -all $BUILD_NUMBER

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "ios/App/App.xcodeproj" \
            --scheme "App"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
