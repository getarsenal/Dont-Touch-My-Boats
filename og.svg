<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <pattern id="scanlines2" width="1" height="3" patternUnits="userSpaceOnUse">
      <rect width="1" height="1" fill="#ffaa33" fill-opacity="0.025"/>
    </pattern>
    <radialGradient id="glow2" cx="30%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffaa33" stop-opacity="0.20"/>
      <stop offset="60%" stop-color="#ffaa33" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffaa33" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background layers -->
  <rect width="1200" height="630" fill="#080604"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect width="1200" height="630" fill="url(#scanlines2)"/>

  <!-- Outer frame brackets at corners (echoes in-game HUD) -->
  <g stroke="#ffaa33" stroke-width="4" fill="none" stroke-opacity="0.6">
    <path d="M 30 60 L 30 30 L 70 30"/>
    <path d="M 1170 60 L 1170 30 L 1130 30"/>
    <path d="M 30 570 L 30 600 L 70 600"/>
    <path d="M 1170 570 L 1170 600 L 1130 600"/>
  </g>

  <!-- ============ LEFT HALF: ICON ============ -->
  <!-- Hex centered around (315, 315), radius 250 -->
  <g transform="translate(315, 315)">
    <polygon points="0,-250 217,-125 217,125 0,250 -217,125 -217,-125"
             fill="none" stroke="#ffaa33" stroke-width="9" stroke-linejoin="miter"/>
    <polygon points="0,-228 198,-114 198,114 0,228 -198,114 -198,-114"
             fill="#ffaa33" fill-opacity="0.04" stroke="#ffaa33" stroke-width="1.5" stroke-opacity="0.55"/>

    <!-- Battleship silhouette, centered, ~430px wide -->
    <g fill="#fff5e0" transform="translate(-200, -30)">
      <path d="M 0 90 L 0 56 L 18 41 L 358 41 L 400 56 L 400 90 Z"/>
      <rect x="18" y="29" width="368" height="14"/>
      <rect x="280" y="17" width="118" height="14"/>
      <!-- aft turret -->
      <rect x="50" y="3" width="40" height="16"/>
      <rect x="10" y="6" width="40" height="2"/>
      <rect x="10" y="10" width="40" height="2"/>
      <rect x="10" y="14" width="40" height="2"/>
      <!-- aft super -->
      <rect x="105" y="3" width="28" height="16"/>
      <!-- funnel -->
      <rect x="160" y="-26" width="40" height="32"/>
      <rect x="155" y="-30" width="50" height="6"/>
      <!-- pagoda -->
      <rect x="220" y="-26" width="68" height="32"/>
      <rect x="230" y="-46" width="50" height="22"/>
      <rect x="240" y="-66" width="34" height="22"/>
      <rect x="250" y="-86" width="18" height="22"/>
      <!-- mast spike -->
      <rect x="258" y="-130" width="3" height="44"/>
      <rect x="246" y="-108" width="28" height="2"/>
      <polygon points="259,-145 255,-128 263,-128"/>
      <!-- forward turret raised -->
      <rect x="296" y="0" width="40" height="16"/>
      <rect x="336" y="3" width="40" height="2"/>
      <rect x="336" y="7" width="40" height="2"/>
      <rect x="336" y="11" width="40" height="2"/>
      <!-- forward lower turret -->
      <rect x="350" y="13" width="34" height="14"/>
      <!-- bow tip -->
      <polygon points="400,56 416,62 400,68"/>
    </g>
  </g>

  <!-- ============ RIGHT HALF: WORDMARK + TAGLINE ============ -->
  <g transform="translate(580, 240)" font-family="DejaVu Sans, Arial Black, Liberation Sans, sans-serif">
    <!-- Small "CLASSIFIED" stamp -->
    <g transform="translate(0, -90) rotate(-2)">
      <rect x="0" y="0" width="190" height="26" fill="none" stroke="#ff5544" stroke-width="2"/>
      <text x="95" y="19" text-anchor="middle" font-size="14" font-weight="bold"
            letter-spacing="0.25em" fill="#ff5544">CLASSIFIED</text>
    </g>

    <!-- DREADNOUGHT wordmark — shrunk to fit -->
    <text x="0" y="0" font-size="68" font-weight="bold" letter-spacing="0.05em" fill="#ffd488">DREADNOUGHT</text>
    <!-- subtitle bar -->
    <rect x="0" y="18" width="500" height="2" fill="#ffaa33" opacity="0.6"/>
    <text x="0" y="56" font-size="20" font-weight="bold" letter-spacing="0.32em" fill="#ffaa33"
          fill-opacity="0.85">ORBITAL · SIEGE · COMMAND</text>

    <!-- Sardonic tagline -->
    <text x="0" y="120" font-size="22" font-style="italic" letter-spacing="0.05em" fill="#ffe6a8">
      Big Bad Boat Empire — Galactic Operations
    </text>
    <text x="0" y="150" font-size="20" font-style="italic" letter-spacing="0.05em" fill="#ffaa33"
          fill-opacity="0.7">
      planet glassing, professionally executed.
    </text>

    <!-- Tactical readout strip at bottom -->
    <g transform="translate(0, 210)" font-family="DejaVu Sans Mono, Courier, monospace"
       font-size="14" letter-spacing="0.18em" fill="#ffaa33" fill-opacity="0.55">
      <rect x="0" y="-18" width="500" height="2" fill="#ffaa33" fill-opacity="0.3"/>
      <text x="0" y="0">› TARGETS: ENDLESS</text>
      <text x="0" y="22">› MERCY: NOT ON THIS FREQUENCY</text>
      <text x="0" y="44">› RECOMMENDED PLAYTIME: ALL OF IT</text>
    </g>
  </g>
</svg>
