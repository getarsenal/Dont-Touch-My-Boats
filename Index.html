<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>DREADSPACE — Orbital Siege Command</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --amber: #ffaa33;
    --amber-bright: #ffcc66;
    --amber-dim: #8a5a1a;
    --olive: #4a5d23;
    --olive-dark: #2a3a14;
    --red: #ff3344;
    --green: #66ff88;
    --steel: #6a7280;
    --bg: #000;
    --panel: rgba(8, 12, 6, 0.78);
    --panel-edge: rgba(255, 170, 51, 0.45);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #000;
    color: var(--amber);
    font-family: 'Share Tech Mono', monospace;
    user-select: none; -webkit-user-select: none;
    touch-action: none; overscroll-behavior: none;
  }
  body { position: fixed; inset: 0; }
  canvas { position: absolute; inset: 0; display: block; }

  /* ===== HUD overlay ===== */
  #hud { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
  #hud > * { pointer-events: auto; }

  /* CRT scanlines + vignette */
  #hud::before {
    content: ''; position: absolute; inset: 0;
    background:
      repeating-linear-gradient(to bottom,
        rgba(0,0,0,0) 0px,
        rgba(0,0,0,0) 2px,
        rgba(0,0,0,0.18) 3px,
        rgba(0,0,0,0) 4px);
    pointer-events: none;
    mix-blend-mode: multiply;
    z-index: 1;
  }
  #hud::after {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
    pointer-events: none; z-index: 1;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    border-radius: 2px;
    box-shadow:
      0 0 20px rgba(255,170,51,0.10),
      inset 0 0 30px rgba(255,170,51,0.04);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
  }
  .corner {
    position: relative;
  }
  .corner::before, .corner::after {
    content: ''; position: absolute; width: 8px; height: 8px;
    border-color: var(--amber);
    border-style: solid;
  }
  .corner::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
  .corner::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

  /* ===== Top status bar ===== */
  #top-bar {
    position: absolute; top: env(safe-area-inset-top, 0); left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 10px 12px;
    gap: 8px;
    z-index: 12;
  }
  #planet-status {
    flex: 1; max-width: 320px;
    padding: 8px 12px;
  }
  #planet-status .label { font-size: 9px; letter-spacing: 0.18em; color: var(--amber-dim); margin-bottom: 4px; }
  #planet-status .name { font-family: 'Black Ops One', sans-serif; font-size: 16px; color: var(--amber-bright); letter-spacing: 0.1em; line-height: 1; }
  #planet-status .level { font-size: 10px; color: var(--amber); margin-top: 2px; letter-spacing: 0.15em; }
  #hp-bar {
    margin-top: 8px; height: 10px; width: 100%;
    background: rgba(0,0,0,0.6); border: 1px solid var(--amber-dim);
    position: relative; overflow: hidden;
  }
  #hp-fill {
    height: 100%; width: 100%;
    background: linear-gradient(90deg, #ff3344 0%, #ff8833 50%, #ffcc44 100%);
    transition: width 0.18s ease-out;
    box-shadow: 0 0 8px rgba(255,80,40,0.6);
  }
  #hp-text { font-size: 9px; margin-top: 3px; color: var(--amber); letter-spacing: 0.1em; }

  #right-stats {
    display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
  }
  .stat-pill {
    padding: 6px 10px;
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; letter-spacing: 0.12em;
    min-width: 110px; justify-content: space-between;
  }
  .stat-pill .label { font-size: 9px; color: var(--amber-dim); }
  .stat-pill .val { font-family: 'Black Ops One', sans-serif; color: var(--amber-bright); font-size: 14px; }
  #pause-btn {
    width: 38px; height: 38px;
    background: var(--panel); border: 1px solid var(--panel-edge);
    color: var(--amber); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; padding: 0;
  }
  #pause-btn:active { background: rgba(255,170,51,0.15); }

  /* ===== Build button ===== */
  #build-btn {
    position: absolute;
    bottom: calc(env(safe-area-inset-bottom, 0) + 14px);
    left: 50%; transform: translateX(-50%);
    padding: 10px 22px;
    background: linear-gradient(180deg, rgba(74,93,35,0.85), rgba(42,58,20,0.92));
    border: 1px solid var(--amber);
    color: var(--amber-bright);
    font-family: 'Black Ops One', sans-serif;
    font-size: 14px; letter-spacing: 0.18em;
    cursor: pointer; z-index: 12;
    box-shadow:
      0 0 20px rgba(255,170,51,0.25),
      inset 0 0 12px rgba(0,0,0,0.4);
  }
  #build-btn:active { transform: translateX(-50%) scale(0.96); background: rgba(255,170,51,0.2); }

  /* ===== Thumbsticks ===== */
  .stick-zone {
    position: absolute;
    bottom: calc(env(safe-area-inset-bottom, 0) + 70px);
    width: 130px; height: 130px;
    z-index: 11;
    touch-action: none;
  }
  #stick-left { left: 14px; }
  #stick-right { right: 14px; }
  .stick-base {
    position: absolute; inset: 0;
    border-radius: 50%;
    border: 1px dashed rgba(255,170,51,0.3);
    background: radial-gradient(circle, rgba(255,170,51,0.05), rgba(0,0,0,0.3));
    opacity: 0.6;
    pointer-events: none;
  }
  .stick-knob {
    position: absolute; top: 50%; left: 50%;
    width: 56px; height: 56px;
    margin: -28px 0 0 -28px;
    border-radius: 50%;
    border: 1px solid var(--amber);
    background: radial-gradient(circle at 30% 30%, rgba(255,200,80,0.4), rgba(255,170,51,0.12) 60%, rgba(0,0,0,0.5));
    box-shadow: 0 0 12px rgba(255,170,51,0.4), inset 0 0 8px rgba(0,0,0,0.5);
    pointer-events: none;
    transition: transform 0.05s linear;
  }
  .stick-label {
    position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
    font-size: 9px; color: var(--amber-dim);
    letter-spacing: 0.2em; white-space: nowrap;
    pointer-events: none;
  }

  /* ===== Build menu modal ===== */
  .modal-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.7);
    display: none; align-items: center; justify-content: center;
    z-index: 30; padding: 20px;
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  }
  .modal-overlay.show { display: flex; }
  .modal {
    width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto;
    padding: 16px;
  }
  .modal-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px; padding-bottom: 10px;
    border-bottom: 1px solid var(--amber-dim);
  }
  .modal-title {
    font-family: 'Black Ops One', sans-serif;
    font-size: 18px; color: var(--amber-bright); letter-spacing: 0.15em;
  }
  .close-btn {
    background: transparent; border: 1px solid var(--amber-dim);
    color: var(--amber); width: 32px; height: 32px;
    cursor: pointer; font-size: 16px;
  }

  .ship-card {
    margin-bottom: 10px; padding: 10px 12px;
    border: 1px solid rgba(255,170,51,0.25);
    background: rgba(20,16,8,0.5);
    display: flex; gap: 12px; align-items: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .ship-card:active { background: rgba(255,170,51,0.1); }
  .ship-card.locked { opacity: 0.45; cursor: not-allowed; }
  .ship-card.affordable { border-color: var(--amber); box-shadow: inset 0 0 10px rgba(255,170,51,0.08); }
  .ship-icon {
    flex-shrink: 0;
    width: 56px; height: 36px;
    background: linear-gradient(135deg, var(--olive), var(--olive-dark));
    border: 1px solid var(--amber-dim);
    position: relative;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Black Ops One', sans-serif; font-size: 9px;
    color: var(--amber-bright); letter-spacing: 0.1em;
  }
  .ship-info { flex: 1; min-width: 0; }
  .ship-name { font-family: 'Black Ops One', sans-serif; font-size: 13px; color: var(--amber-bright); letter-spacing: 0.12em; }
  .ship-stats { font-size: 10px; color: var(--amber-dim); margin-top: 3px; letter-spacing: 0.06em; }
  .ship-cost { flex-shrink: 0; text-align: right; }
  .ship-cost .num { font-family: 'Black Ops One', sans-serif; font-size: 14px; color: var(--amber-bright); }
  .ship-cost .lbl { font-size: 9px; color: var(--amber-dim); letter-spacing: 0.1em; }

  /* ===== Boot/title screen ===== */
  #boot {
    position: absolute; inset: 0;
    background: #000;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 50;
    text-align: center; padding: 20px;
  }
  #boot h1 {
    font-family: 'Black Ops One', sans-serif;
    font-size: clamp(36px, 9vw, 72px);
    letter-spacing: 0.18em;
    color: var(--amber-bright);
    text-shadow:
      0 0 20px rgba(255,170,51,0.6),
      0 0 40px rgba(255,80,20,0.3);
    margin-bottom: 8px;
  }
  #boot .subtitle {
    font-size: 11px; color: var(--amber-dim);
    letter-spacing: 0.3em; margin-bottom: 30px;
  }
  #boot .terminal {
    font-size: 11px; color: var(--green);
    letter-spacing: 0.06em;
    text-align: left; margin-bottom: 30px;
    max-width: 320px; min-height: 80px;
  }
  #boot .terminal .line { opacity: 0; animation: lineIn 0.4s forwards; }
  @keyframes lineIn { to { opacity: 1; } }
  #start-btn {
    padding: 14px 36px;
    background: linear-gradient(180deg, rgba(74,93,35,0.95), rgba(42,58,20,0.95));
    border: 1px solid var(--amber);
    color: var(--amber-bright);
    font-family: 'Black Ops One', sans-serif;
    font-size: 16px; letter-spacing: 0.2em;
    cursor: pointer;
    box-shadow: 0 0 24px rgba(255,170,51,0.4);
    animation: pulseBtn 2s ease-in-out infinite;
  }
  @keyframes pulseBtn {
    0%, 100% { box-shadow: 0 0 24px rgba(255,170,51,0.4); }
    50%      { box-shadow: 0 0 36px rgba(255,170,51,0.7); }
  }

  /* ===== Pause overlay ===== */
  #pause-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.85);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    z-index: 40; gap: 14px;
    backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
  }
  #pause-overlay.show { display: flex; }
  #pause-overlay h2 {
    font-family: 'Black Ops One', sans-serif; font-size: 36px;
    color: var(--amber-bright); letter-spacing: 0.25em;
    text-shadow: 0 0 20px rgba(255,170,51,0.6);
  }
  #pause-overlay button {
    padding: 10px 28px; min-width: 160px;
    background: var(--panel); border: 1px solid var(--amber);
    color: var(--amber-bright); font-family: 'Black Ops One', sans-serif;
    font-size: 13px; letter-spacing: 0.18em; cursor: pointer;
  }
  #pause-overlay button:active { background: rgba(255,170,51,0.2); }

  /* ===== Toast notifications ===== */
  #toasts {
    position: absolute;
    top: calc(env(safe-area-inset-top, 0) + 90px);
    left: 50%; transform: translateX(-50%);
    z-index: 25; pointer-events: none;
    display: flex; flex-direction: column; gap: 4px; align-items: center;
  }
  .toast {
    padding: 6px 14px;
    background: rgba(0,0,0,0.7); border: 1px solid var(--amber-dim);
    color: var(--amber-bright);
    font-size: 11px; letter-spacing: 0.15em;
    animation: toastIn 0.3s ease-out, toastOut 0.4s ease-in 1.6s forwards;
  }
  .toast.warn { border-color: var(--red); color: var(--red); }
  .toast.good { border-color: var(--green); color: var(--green); }
  @keyframes toastIn  { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes toastOut { to   { opacity: 0; transform: translateY(-8px); } }

  /* Hide stick UI on non-touch devices */
  @media (hover: hover) and (pointer: fine) {
    .stick-zone { display: none; }
  }

  /* Compact for small screens */
  @media (max-height: 600px) {
    .stick-zone { width: 110px; height: 110px; bottom: calc(env(safe-area-inset-bottom, 0) + 50px); }
    .stick-knob { width: 46px; height: 46px; margin: -23px 0 0 -23px; }
    #build-btn { bottom: calc(env(safe-area-inset-bottom, 0) + 8px); padding: 8px 18px; font-size: 12px; }
  }
</style>
</head>
<body>

<canvas id="scene"></canvas>

<!-- HUD overlay -->
<div id="hud">
  <div id="top-bar">
    <div id="planet-status" class="panel corner">
      <div class="label">TARGET // ORBITAL CONTACT</div>
      <div class="name" id="planet-name">KEPLER-7B</div>
      <div class="level" id="planet-level">SECTOR 01</div>
      <div id="hp-bar"><div id="hp-fill"></div></div>
      <div id="hp-text">INTEGRITY: 100%</div>
    </div>
    <div id="right-stats">
      <div class="stat-pill panel corner">
        <span class="label">SCRAP</span><span class="val" id="resource-val">100</span>
      </div>
      <div class="stat-pill panel corner">
        <span class="label">FLEET</span><span class="val" id="fleet-val">0</span>
      </div>
      <button id="pause-btn" class="corner" aria-label="Pause">II</button>
    </div>
  </div>

  <div id="toasts"></div>

  <button id="build-btn">⚒ COMMISSION VESSEL</button>

  <div id="stick-left" class="stick-zone">
    <div class="stick-label">ORBIT</div>
    <div class="stick-base"></div>
    <div class="stick-knob"></div>
  </div>
  <div id="stick-right" class="stick-zone">
    <div class="stick-label">RANGE / TILT</div>
    <div class="stick-base"></div>
    <div class="stick-knob"></div>
  </div>
</div>

<!-- Build menu -->
<div id="build-modal" class="modal-overlay">
  <div class="modal panel corner">
    <div class="modal-header">
      <div class="modal-title">SHIPYARD // ORDNANCE</div>
      <button class="close-btn" id="close-build">✕</button>
    </div>
    <div id="ship-list"></div>
  </div>
</div>

<!-- Pause -->
<div id="pause-overlay">
  <h2>// PAUSED //</h2>
  <button id="resume-btn">RESUME</button>
  <button id="restart-btn">RESTART CAMPAIGN</button>
</div>

<!-- Boot screen -->
<div id="boot">
  <h1>DREADSPACE</h1>
  <div class="subtitle">// ORBITAL SIEGE COMMAND //</div>
  <div class="terminal" id="terminal"></div>
  <button id="start-btn">▶ INITIATE ASSAULT</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';

/* ============================================================
 * DREADSPACE — Orbital Siege Command
 * Single-file HTML5 / Three.js space combat game
 * ============================================================ */

const TAU = Math.PI * 2;
const lerp = (a,b,t) => a + (b-a)*t;
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
const rand = (a,b) => a + Math.random()*(b-a);
const randSign = () => Math.random() < 0.5 ? -1 : 1;

/* ============================================================
 * AUDIO ENGINE — fully procedural Web Audio synth
 * ============================================================ */
class AudioEngine {
  constructor() {
    this.ctx = null;
    this.master = null;
    this.muted = false;
    this.lastBoom = 0;
  }
  init() {
    if (this.ctx) return;
    const Ctx = window.AudioContext || window.webkitAudioContext;
    this.ctx = new Ctx();
    this.master = this.ctx.createGain();
    this.master.gain.value = 0.55;
    this.master.connect(this.ctx.destination);
    this._startAmbient();
  }
  resume() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); }

  _startAmbient() {
    const ctx = this.ctx;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();
    osc.type = 'sawtooth';
    osc.frequency.value = 42;
    filter.type = 'lowpass';
    filter.frequency.value = 110;
    gain.gain.value = 0.05;
    osc.connect(filter); filter.connect(gain); gain.connect(this.master);
    osc.start();
    // Slow LFO on filter
    const lfo = ctx.createOscillator();
    const lfoGain = ctx.createGain();
    lfo.frequency.value = 0.07;
    lfoGain.gain.value = 30;
    lfo.connect(lfoGain); lfoGain.connect(filter.frequency);
    lfo.start();
  }

  _noiseBuffer(seconds = 1) {
    const sr = this.ctx.sampleRate;
    const buf = this.ctx.createBuffer(1, sr*seconds, sr);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random()*2 - 1;
    return buf;
  }

  // Big cannon boom
  cannon(strength = 1) {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    if (t - this.lastBoom < 0.02) return;
    this.lastBoom = t;
    // Low oscillator thump
    const osc = this.ctx.createOscillator();
    const oscGain = this.ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(180, t);
    osc.frequency.exponentialRampToValueAtTime(40, t + 0.18);
    oscGain.gain.setValueAtTime(0.0001, t);
    oscGain.gain.exponentialRampToValueAtTime(0.7 * strength, t + 0.005);
    oscGain.gain.exponentialRampToValueAtTime(0.0001, t + 0.32);
    osc.connect(oscGain); oscGain.connect(this.master);
    osc.start(t); osc.stop(t + 0.4);

    // Noise crack
    const noise = this.ctx.createBufferSource();
    noise.buffer = this._noiseBuffer(0.3);
    const nFilter = this.ctx.createBiquadFilter();
    nFilter.type = 'bandpass';
    nFilter.frequency.value = 1200; nFilter.Q.value = 0.7;
    const nGain = this.ctx.createGain();
    nGain.gain.setValueAtTime(0.4 * strength, t);
    nGain.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
    noise.connect(nFilter); nFilter.connect(nGain); nGain.connect(this.master);
    noise.start(t);
  }

  // Smaller defense turret pop
  turret() {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(420, t);
    osc.frequency.exponentialRampToValueAtTime(120, t + 0.08);
    gain.gain.setValueAtTime(0.18, t);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);
    osc.connect(gain); gain.connect(this.master);
    osc.start(t); osc.stop(t + 0.15);
  }

  hit() {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const noise = this.ctx.createBufferSource();
    noise.buffer = this._noiseBuffer(0.12);
    const f = this.ctx.createBiquadFilter();
    f.type = 'bandpass'; f.frequency.value = 2500; f.Q.value = 1.5;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.15, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.1);
    noise.connect(f); f.connect(g); g.connect(this.master);
    noise.start(t);
  }

  explosion(big = false) {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const dur = big ? 0.9 : 0.45;
    // Sub thud
    const osc = this.ctx.createOscillator();
    const og = this.ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(big ? 90 : 130, t);
    osc.frequency.exponentialRampToValueAtTime(25, t + dur*0.6);
    og.gain.setValueAtTime(0.0001, t);
    og.gain.exponentialRampToValueAtTime(big ? 1.0 : 0.55, t + 0.01);
    og.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(og); og.connect(this.master);
    osc.start(t); osc.stop(t + dur + 0.05);
    // Noise blast
    const noise = this.ctx.createBufferSource();
    noise.buffer = this._noiseBuffer(dur);
    const nf = this.ctx.createBiquadFilter();
    nf.type = 'lowpass';
    nf.frequency.setValueAtTime(big ? 3000 : 1800, t);
    nf.frequency.exponentialRampToValueAtTime(120, t + dur);
    const ng = this.ctx.createGain();
    ng.gain.setValueAtTime(big ? 0.7 : 0.4, t);
    ng.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    noise.connect(nf); nf.connect(ng); ng.connect(this.master);
    noise.start(t);
  }

  ui(freq = 880) {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    osc.type = 'triangle'; osc.frequency.value = freq;
    g.gain.setValueAtTime(0.18, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);
    osc.connect(g); g.connect(this.master);
    osc.start(t); osc.stop(t + 0.15);
  }

  victoryFanfare() {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const notes = [330, 415, 494, 660];
    notes.forEach((f, i) => {
      const osc = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      osc.type = 'sawtooth'; osc.frequency.value = f;
      const startT = t + i*0.12;
      g.gain.setValueAtTime(0.0001, startT);
      g.gain.exponentialRampToValueAtTime(0.22, startT + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, startT + 0.5);
      const filter = this.ctx.createBiquadFilter();
      filter.type = 'lowpass'; filter.frequency.value = 1500;
      osc.connect(filter); filter.connect(g); g.connect(this.master);
      osc.start(startT); osc.stop(startT + 0.55);
    });
  }
}

/* ============================================================
 * MAIN GAME CLASS
 * ============================================================ */
class Game {
  constructor() {
    this.audio = new AudioEngine();
    this.canvas = document.getElementById('scene');
    this.clock = new THREE.Clock();
    this.running = false;
    this.paused = false;
    this.gameTime = 0;

    // Game state
    this.state = {
      resources: 280,
      planetLevel: 1,
      planetHP: 1000,
      planetMaxHP: 1000,
      fleet: 0,
      planetsDestroyed: 0,
    };

    // Entity arrays
    this.ships = [];          // player attacker ships
    this.turrets = [];        // planet defense turrets
    this.projectiles = [];    // both directions
    this.particles = [];      // explosion sprites
    this.debris = [];         // floating wreckage

    // Camera state (orbital)
    this.camState = {
      azimuth: 0.4,
      elevation: 0.25,
      distance: 28,
      targetDistance: 28,
      tilt: 0,
    };

    // Input state
    this.input = {
      stickL: { x: 0, y: 0, active: false, id: null },
      stickR: { x: 0, y: 0, active: false, id: null },
      mouseDown: false,
      lastMouseX: 0, lastMouseY: 0,
      keys: {},
    };

    this._initScene();
    this._initInput();
    this._initUI();
    this._buildShipMenu();
  }

  /* ---------- SCENE ---------- */
  _initScene() {
    this.scene = new THREE.Scene();
    this.scene.background = new THREE.Color(0x000003);
    this.scene.fog = null;

    this.camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);

    this.renderer = new THREE.WebGLRenderer({
      canvas: this.canvas,
      antialias: window.devicePixelRatio < 2,
      powerPreference: 'high-performance'
    });
    this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    this.renderer.setSize(window.innerWidth, window.innerHeight);
    this.renderer.shadowMap.enabled = true;
    this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    this.renderer.outputEncoding = THREE.sRGBEncoding;
    this.renderer.toneMapping = THREE.ACESFilmicToneMapping;
    this.renderer.toneMappingExposure = 1.05;

    // Sun (distant directional light)
    this.sun = new THREE.DirectionalLight(0xffeecc, 2.2);
    this.sun.position.set(60, 18, 30);
    this.sun.castShadow = true;
    this.sun.shadow.mapSize.set(1024, 1024);
    this.sun.shadow.camera.near = 30;
    this.sun.shadow.camera.far = 120;
    this.sun.shadow.camera.left = -25;
    this.sun.shadow.camera.right = 25;
    this.sun.shadow.camera.top = 25;
    this.sun.shadow.camera.bottom = -25;
    this.sun.shadow.bias = -0.0008;
    this.scene.add(this.sun);

    // Faint ambient (rim of starlight)
    this.scene.add(new THREE.AmbientLight(0x22334a, 0.18));

    // Visible sun mesh way out there
    const sunGeo = new THREE.SphereGeometry(4, 16, 16);
    const sunMat = new THREE.MeshBasicMaterial({ color: 0xffeebb });
    this.sunMesh = new THREE.Mesh(sunGeo, sunMat);
    this.sunMesh.position.copy(this.sun.position).multiplyScalar(2);
    this.scene.add(this.sunMesh);

    // Sun glare sprite
    const glareCanvas = document.createElement('canvas');
    glareCanvas.width = 256; glareCanvas.height = 256;
    const gctx = glareCanvas.getContext('2d');
    const grad = gctx.createRadialGradient(128, 128, 0, 128, 128, 128);
    grad.addColorStop(0, 'rgba(255,240,180,1)');
    grad.addColorStop(0.2, 'rgba(255,220,140,0.5)');
    grad.addColorStop(1, 'rgba(255,180,80,0)');
    gctx.fillStyle = grad; gctx.fillRect(0,0,256,256);
    const glareTex = new THREE.CanvasTexture(glareCanvas);
    const glare = new THREE.Sprite(new THREE.SpriteMaterial({ map: glareTex, transparent: true, depthWrite: false, blending: THREE.AdditiveBlending }));
    glare.scale.set(40, 40, 1);
    this.sunMesh.add(glare);

    // Starfield + nebula
    this._createStarfield();
    this._createNebula();

    // Planet
    this._createPlanet(this.state.planetLevel);

    window.addEventListener('resize', () => this._onResize());
  }

  _createStarfield() {
    const count = 4000;
    const positions = new Float32Array(count * 3);
    const colors = new Float32Array(count * 3);
    const sizes = new Float32Array(count);
    for (let i = 0; i < count; i++) {
      const r = 250 + Math.random() * 50;
      const theta = Math.random() * TAU;
      const phi = Math.acos(2 * Math.random() - 1);
      positions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
      positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
      positions[i*3+2] = r * Math.cos(phi);
      const tint = Math.random();
      if (tint < 0.7) {
        colors[i*3] = 1.0; colors[i*3+1] = 1.0; colors[i*3+2] = 1.0;
      } else if (tint < 0.85) {
        colors[i*3] = 0.85; colors[i*3+1] = 0.92; colors[i*3+2] = 1.0;
      } else if (tint < 0.95) {
        colors[i*3] = 1.0; colors[i*3+1] = 0.85; colors[i*3+2] = 0.7;
      } else {
        colors[i*3] = 1.0; colors[i*3+1] = 0.95; colors[i*3+2] = 0.6;
      }
      sizes[i] = Math.random() < 0.05 ? 2.5 : (Math.random() < 0.3 ? 1.6 : 0.9);
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
    geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));
    const mat = new THREE.PointsMaterial({
      size: 1.2, sizeAttenuation: false,
      vertexColors: true, transparent: true, opacity: 0.95,
      depthWrite: false
    });
    this.starfield = new THREE.Points(geo, mat);
    this.scene.add(this.starfield);
  }

  _createNebula() {
    // A few large, faint colored sprites for a sense of depth
    const sprites = [
      { color: '#3a1a55', x: -120, y: 40, z: -180, scale: 220 },
      { color: '#1a3a55', x: 140, y: -30, z: -160, scale: 260 },
      { color: '#551a2a', x: -50, y: -80, z: 170, scale: 180 },
      { color: '#2a3a1a', x: 80, y: 90, z: 150, scale: 200 },
    ];
    sprites.forEach(s => {
      const c = document.createElement('canvas');
      c.width = 256; c.height = 256;
      const ctx = c.getContext('2d');
      const grad = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
      grad.addColorStop(0, s.color + 'cc');
      grad.addColorStop(0.4, s.color + '44');
      grad.addColorStop(1, s.color + '00');
      ctx.fillStyle = grad; ctx.fillRect(0,0,256,256);
      const tex = new THREE.CanvasTexture(c);
      const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
        map: tex, transparent: true, opacity: 0.4, depthWrite: false,
        blending: THREE.AdditiveBlending
      }));
      sprite.position.set(s.x, s.y, s.z);
      sprite.scale.set(s.scale, s.scale, 1);
      this.scene.add(sprite);
    });
  }

  _createPlanetTexture(level) {
    const c = document.createElement('canvas');
    c.width = 1024; c.height = 512;
    const ctx = c.getContext('2d');
    // Procedural palette per level
    const palettes = [
      { sea: '#0a2a45', land: '#3a6a3a', highland: '#2a4a2a', desert: '#a08850' },     // earth-like
      { sea: '#5a2a0a', land: '#9a4520', highland: '#5a200a', desert: '#c07040' },     // mars
      { sea: '#4a4a4a', land: '#7a7a8a', highland: '#3a3a4a', desert: '#9a9aaa' },     // moon
      { sea: '#0a4055', land: '#306a85', highland: '#2a4555', desert: '#80b0c0' },     // ice world
      { sea: '#2a0a3a', land: '#5a1a6a', highland: '#3a0a4a', desert: '#8a4a9a' },     // alien
      { sea: '#2a1a05', land: '#5a3010', highland: '#3a1a05', desert: '#a07040' },     // scorched
    ];
    const palette = palettes[(level - 1) % palettes.length];

    // Sea base
    ctx.fillStyle = palette.sea;
    ctx.fillRect(0, 0, c.width, c.height);

    // Continents via blob splatter
    const continents = 8 + level * 2;
    for (let i = 0; i < continents; i++) {
      const cx = Math.random() * c.width;
      const cy = 80 + Math.random() * (c.height - 160);
      const blobs = 30 + Math.floor(Math.random() * 40);
      ctx.fillStyle = palette.land;
      for (let b = 0; b < blobs; b++) {
        const dx = cx + (Math.random() - 0.5) * 200;
        const dy = cy + (Math.random() - 0.5) * 100;
        const r = 8 + Math.random() * 28;
        ctx.beginPath(); ctx.arc(dx, dy, r, 0, TAU); ctx.fill();
      }
    }
    // Highlands
    ctx.fillStyle = palette.highland;
    for (let i = 0; i < 200; i++) {
      ctx.beginPath();
      ctx.arc(Math.random() * c.width, 60 + Math.random() * (c.height - 120), 3 + Math.random() * 14, 0, TAU);
      ctx.fill();
    }
    // Desert / sand bands
    ctx.fillStyle = palette.desert;
    ctx.globalAlpha = 0.5;
    for (let i = 0; i < 80; i++) {
      ctx.beginPath();
      ctx.arc(Math.random() * c.width, 40 + Math.random() * (c.height - 80), 4 + Math.random() * 18, 0, TAU);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    // Ice caps (top and bottom)
    const capGrad = ctx.createLinearGradient(0, 0, 0, 80);
    capGrad.addColorStop(0, '#ffffff'); capGrad.addColorStop(1, palette.sea);
    ctx.fillStyle = capGrad; ctx.fillRect(0, 0, c.width, 80);
    const capGrad2 = ctx.createLinearGradient(0, c.height-80, 0, c.height);
    capGrad2.addColorStop(0, palette.sea); capGrad2.addColorStop(1, '#ffffff');
    ctx.fillStyle = capGrad2; ctx.fillRect(0, c.height-80, c.width, 80);

    return new THREE.CanvasTexture(c);
  }

  _createPlanet(level) {
    if (this.planetGroup) {
      this.scene.remove(this.planetGroup);
      this.planetGroup.traverse(o => { if (o.geometry) o.geometry.dispose(); if (o.material) { if (Array.isArray(o.material)) o.material.forEach(m=>m.dispose()); else o.material.dispose(); } });
    }
    this.planetGroup = new THREE.Group();
    this.scene.add(this.planetGroup);

    const radius = 5;
    this.planetRadius = radius;

    const geo = new THREE.SphereGeometry(radius, 96, 96);
    const tex = this._createPlanetTexture(level);
    const mat = new THREE.MeshStandardMaterial({
      map: tex,
      roughness: 0.85,
      metalness: 0.05,
      bumpMap: tex,
      bumpScale: 0.06,
    });
    this.planet = new THREE.Mesh(geo, mat);
    this.planet.castShadow = true;
    this.planet.receiveShadow = true;
    this.planetGroup.add(this.planet);

    // Atmosphere glow shell
    const atmoGeo = new THREE.SphereGeometry(radius * 1.08, 64, 64);
    const atmoMat = new THREE.ShaderMaterial({
      uniforms: {
        glowColor: { value: new THREE.Color(0x88aaff) },
        viewVector: { value: this.camera.position.clone() }
      },
      vertexShader: `
        uniform vec3 viewVector;
        varying float intensity;
        void main() {
          vec3 vNormal = normalize(normalMatrix * normal);
          vec3 vView = normalize(normalMatrix * viewVector);
          intensity = pow(0.65 - dot(vNormal, vView), 3.0);
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform vec3 glowColor;
        varying float intensity;
        void main() {
          gl_FragColor = vec4(glowColor, 1.0) * intensity;
        }
      `,
      side: THREE.BackSide,
      blending: THREE.AdditiveBlending,
      transparent: true,
      depthWrite: false,
    });
    this.atmosphere = new THREE.Mesh(atmoGeo, atmoMat);
    this.planetGroup.add(this.atmosphere);

    // Spawn defense turrets on the surface
    this.turrets.forEach(t => this.planetGroup.remove(t.mesh));
    this.turrets = [];
    const numTurrets = 6 + level * 2;
    for (let i = 0; i < numTurrets; i++) {
      const turret = this._createDefenseTurret(level);
      // Random surface position
      const u = Math.random();
      const v = Math.random();
      const theta = TAU * u;
      const phi = Math.acos(2*v - 1);
      const tx = radius * Math.sin(phi) * Math.cos(theta);
      const ty = radius * Math.cos(phi);
      const tz = radius * Math.sin(phi) * Math.sin(theta);
      turret.mesh.position.set(tx, ty, tz);
      const up = new THREE.Vector3(tx, ty, tz).normalize();
      turret.mesh.lookAt(turret.mesh.position.clone().add(up));
      turret.mesh.rotateX(Math.PI / 2);
      this.planetGroup.add(turret.mesh);
      this.turrets.push(turret);
    }

    // Update HP scaling
    this.state.planetMaxHP = Math.floor(1000 * Math.pow(1.45, level - 1));
    this.state.planetHP = this.state.planetMaxHP;
    this._updateHUD();
  }

  _createDefenseTurret(level) {
    const group = new THREE.Group();
    const baseMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.6, roughness: 0.4 });
    const accentMat = new THREE.MeshStandardMaterial({ color: 0x4a3010, metalness: 0.7, roughness: 0.3, emissive: 0x331500, emissiveIntensity: 0.4 });
    const barrelMat = new THREE.MeshStandardMaterial({ color: 0x111111, metalness: 0.85, roughness: 0.2 });

    // Base ring (stays put on surface)
    const base = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.22, 0.08, 12), baseMat);
    base.castShadow = true;
    group.add(base);

    // Aim group: yaw + pitch will be applied here. Everything that should move
    // with the gun goes inside (dome, barrel).
    const aim = new THREE.Group();
    aim.position.y = 0.04;
    aim.rotation.order = 'YZX'; // yaw (Y) first, then elevation (Z), then anything else
    group.add(aim);

    // Dome that pivots with the gun
    const dome = new THREE.Mesh(new THREE.SphereGeometry(0.16, 16, 12, 0, TAU, 0, Math.PI/2), accentMat);
    aim.add(dome);

    // Barrel — cylinder length is along its own +Y; rotation.z=PI/2 lays it horizontal
    // such that the muzzle ends up at aim-local +X * 0.4 (length 0.4, position 0.18 + 0.2 = 0.38 ≈ 0.4).
    const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.03, 0.4, 8), barrelMat);
    barrel.rotation.z = Math.PI / 2;
    barrel.position.set(0.18, 0.06, 0);
    barrel.castShadow = true;
    aim.add(barrel);

    group.castShadow = true;

    return {
      mesh: group,
      aim: aim,
      barrel: barrel,
      hp: 36 + level * 14,
      maxHp: 36 + level * 14,
      dps: 2.0 + level * 0.7,
      fireRate: 0.85 + Math.random()*0.3,
      fireTimer: Math.random() * 1.5,
      range: 22,
      target: null,
    };
  }

  /* ---------- SHIP CREATION ---------- */
  _createShip(tier) {
    const cfg = SHIP_TIERS[tier];
    const group = new THREE.Group();

    const hullMat = new THREE.MeshStandardMaterial({
      color: cfg.color, metalness: 0.55, roughness: 0.55,
    });
    const accentMat = new THREE.MeshStandardMaterial({
      color: cfg.accent, metalness: 0.7, roughness: 0.4
    });
    const panelMat = new THREE.MeshStandardMaterial({
      color: cfg.panelColor, metalness: 0.4, roughness: 0.25,
      emissive: 0x081530, emissiveIntensity: 0.4
    });
    const glassMat = new THREE.MeshStandardMaterial({
      color: 0x77aaff, metalness: 0.1, roughness: 0.1,
      emissive: 0x4488ff, emissiveIntensity: 0.6
    });
    const thrustMat = new THREE.MeshBasicMaterial({ color: 0xff7733 });

    // ----- Main hull (long, tapered front) -----
    const L = cfg.length, W = cfg.width, H = cfg.height;
    const hull = new THREE.Mesh(new THREE.BoxGeometry(L, H, W), hullMat);
    hull.castShadow = true; hull.receiveShadow = true;
    group.add(hull);

    // Tapered nose
    const noseGeo = new THREE.ConeGeometry(W*0.5, L*0.25, 8);
    const nose = new THREE.Mesh(noseGeo, hullMat);
    nose.rotation.z = -Math.PI / 2;
    nose.position.x = L * 0.625;
    nose.castShadow = true;
    group.add(nose);

    // Lower hull belly
    const belly = new THREE.Mesh(new THREE.BoxGeometry(L*0.85, H*0.5, W*0.7), accentMat);
    belly.position.y = -H*0.6;
    belly.castShadow = true;
    group.add(belly);

    // ----- Bridge superstructure (multi-tier stack) -----
    const bridgeGroup = new THREE.Group();
    const b1 = new THREE.Mesh(new THREE.BoxGeometry(L*0.25, H*0.6, W*0.7), hullMat);
    b1.position.y = H*0.5 + H*0.3;
    bridgeGroup.add(b1);
    const b2 = new THREE.Mesh(new THREE.BoxGeometry(L*0.18, H*0.5, W*0.55), hullMat);
    b2.position.y = H*0.5 + H*0.3 + H*0.55;
    bridgeGroup.add(b2);
    const b3 = new THREE.Mesh(new THREE.BoxGeometry(L*0.08, H*0.4, W*0.4), accentMat);
    b3.position.y = H*0.5 + H*0.3 + H*0.55 + H*0.45;
    bridgeGroup.add(b3);
    // Bridge windows (glow stripe)
    const win = new THREE.Mesh(new THREE.BoxGeometry(L*0.255, H*0.08, W*0.71), glassMat);
    win.position.y = H*0.5 + H*0.45;
    bridgeGroup.add(win);
    bridgeGroup.position.x = -L*0.05;
    bridgeGroup.children.forEach(c => { c.castShadow = true; });
    group.add(bridgeGroup);

    // ----- Mast / antenna -----
    const mast = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.04, H*1.6, 6), accentMat);
    mast.position.set(-L*0.05, H*0.5 + H*1.5, 0);
    group.add(mast);
    // Crow's nest
    const cn = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.12, 0.18), accentMat);
    cn.position.set(-L*0.05, H*0.5 + H*1.0, 0);
    group.add(cn);
    // Top antenna spike
    const spike = new THREE.Mesh(new THREE.ConeGeometry(0.04, 0.4, 6), accentMat);
    spike.position.set(-L*0.05, H*0.5 + H*1.6 + 0.2, 0);
    group.add(spike);

    // ----- Gun turrets along top deck -----
    const turretRefs = [];
    const turretSpacing = (L * 0.85) / Math.max(1, cfg.turrets);
    for (let i = 0; i < cfg.turrets; i++) {
      const turret = this._createShipTurret(cfg, hullMat, accentMat);
      const xPos = -L*0.42 + (i + 0.5) * turretSpacing;
      // Skip overlap with bridge
      const skipBridge = Math.abs(xPos - (-L*0.05)) < L*0.13;
      const finalX = skipBridge ? (i < cfg.turrets/2 ? xPos - L*0.18 : xPos + L*0.18) : xPos;
      turret.group.position.set(finalX, H*0.5, 0);
      group.add(turret.group);
      turretRefs.push(turret);
    }

    // ----- Solar panel wings -----
    for (let side of [-1, 1]) {
      const wing = new THREE.Group();
      const arm = new THREE.Mesh(new THREE.BoxGeometry(L*0.12, H*0.15, 0.08), accentMat);
      arm.position.set(0, 0, side * (W*0.5 + 0.08));
      wing.add(arm);
      const panel = new THREE.Mesh(new THREE.BoxGeometry(L*0.5, 0.04, W*0.85), panelMat);
      panel.position.set(0, 0, side * (W*0.5 + 0.55));
      wing.add(panel);
      // Frame outline on panel
      const frame = new THREE.Mesh(new THREE.BoxGeometry(L*0.51, 0.06, 0.04), accentMat);
      frame.position.set(0, 0, side * (W*0.5 + 0.55 - W*0.4));
      wing.add(frame);
      const frame2 = frame.clone();
      frame2.position.z = side * (W*0.5 + 0.55 + W*0.4);
      wing.add(frame2);
      wing.children.forEach(c => c.castShadow = true);
      group.add(wing);
    }

    // ----- Thrusters (rear) -----
    const thrusterCount = cfg.turrets;
    for (let i = 0; i < thrusterCount; i++) {
      const yOff = (i - (thrusterCount-1)/2) * 0.18;
      const housing = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.22, 0.3, 12), accentMat);
      housing.rotation.z = Math.PI / 2;
      housing.position.set(-L*0.55, yOff, 0);
      housing.castShadow = true;
      group.add(housing);
      // Glow disc
      const glow = new THREE.Mesh(new THREE.CircleGeometry(0.16, 16), thrustMat);
      glow.rotation.y = -Math.PI / 2;
      glow.position.set(-L*0.55 - 0.16, yOff, 0);
      group.add(glow);
      // Add to a ref so we can pulse
      group.userData.thrusterGlows = group.userData.thrusterGlows || [];
      group.userData.thrusterGlows.push(glow);
    }

    return {
      tier: cfg.id,
      cfg: cfg,
      mesh: group,
      turrets: turretRefs,
      hp: cfg.hull,
      maxHp: cfg.hull,
      dps: cfg.dps,
      fireRate: cfg.fireRate,
      fireTimer: Math.random() * (1 / cfg.fireRate),
      range: cfg.range,
      orbitR: cfg.orbitR,
      orbitSpeed: cfg.orbitSpeed * (Math.random() < 0.5 ? 1 : -1),  // mixed direction
      orbitAngle: Math.random() * TAU,
      orbitTilt: rand(-0.3, 0.3),
      orbitPhase: Math.random() * TAU,
      bobPhase: Math.random() * TAU,
    };
  }

  _createShipTurret(cfg, hullMat, accentMat) {
    const group = new THREE.Group();
    // Base
    const base = new THREE.Mesh(new THREE.CylinderGeometry(cfg.width*0.32, cfg.width*0.36, cfg.height*0.5, 12), accentMat);
    base.position.y = cfg.height*0.25;
    base.castShadow = true;
    group.add(base);
    // Aim/swivel head
    const aim = new THREE.Group();
    aim.position.y = cfg.height*0.5;
    const head = new THREE.Mesh(new THREE.BoxGeometry(cfg.width*0.5, cfg.height*0.4, cfg.width*0.55), hullMat);
    head.castShadow = true;
    aim.add(head);
    // Barrels
    const barrels = [];
    const barrelLen = cfg.length * 0.22;
    const barrelMat = new THREE.MeshStandardMaterial({ color: 0x080808, metalness: 0.9, roughness: 0.2 });
    for (let b = 0; b < cfg.barrels; b++) {
      const offset = (b - (cfg.barrels-1)/2) * (cfg.width * 0.18);
      const barrel = new THREE.Mesh(new THREE.CylinderGeometry(cfg.width*0.05, cfg.width*0.06, barrelLen, 8), barrelMat);
      barrel.rotation.z = Math.PI / 2;
      barrel.position.set(barrelLen*0.5, cfg.height*0.05, offset);
      barrel.castShadow = true;
      aim.add(barrel);
      barrels.push(barrel);
    }
    group.add(aim);
    return { group, aim, barrels, barrelLen, fireSeq: 0 };
  }

  /* ---------- COMBAT ---------- */
  _spawnShip(tier) {
    const cfg = SHIP_TIERS[tier];
    if (this.state.resources < cfg.cost) {
      this._toast('INSUFFICIENT SCRAP', 'warn');
      this.audio.ui(220);
      return false;
    }
    this.state.resources -= cfg.cost;
    const ship = this._createShip(tier);
    this.scene.add(ship.mesh);
    this.ships.push(ship);
    this.state.fleet++;
    this._toast(`${cfg.code} ${cfg.name} COMMISSIONED`, 'good');
    this.audio.ui(660);
    this._updateHUD();
    return true;
  }

  _fireShipProjectile(ship, turretRef) {
    // Get muzzle world position. In aim local space, muzzle tip is at +X = barrelLen
    // (because each barrel mesh's center is at barrelLen/2 and extends barrelLen/2 forward)
    const idx = turretRef.fireSeq % turretRef.barrels.length;
    const barrelZ = turretRef.barrels[idx].position.z;
    const worldPos = new THREE.Vector3(turretRef.barrelLen, ship.cfg.height * 0.05, barrelZ);
    turretRef.aim.localToWorld(worldPos);

    turretRef.fireSeq++;

    // Aim at random point on planet surface
    const targetPoint = new THREE.Vector3(rand(-1,1), rand(-1,1), rand(-1,1)).normalize().multiplyScalar(this.planetRadius * 0.95);
    targetPoint.add(this.planetGroup.position);

    const dir = targetPoint.clone().sub(worldPos).normalize();

    this._spawnProjectile({
      pos: worldPos,
      dir: dir,
      speed: 28,
      color: 0xffaa44,
      glowColor: 0xff6611,
      damage: ship.dps / ship.fireRate,
      maxLife: 2.0,
      fromShip: true,
      sourceShip: ship,
      length: 0.5,
    });

    // Muzzle flash
    this._spawnMuzzleFlash(worldPos, dir, 0xffcc66);
    this.audio.cannon(Math.min(1.3, 0.5 + ship.cfg.length * 0.12));
  }

  _fireTurretProjectile(turret) {
    if (!turret.target) return;
    // Muzzle = barrel's far end in barrel local space (cylinder length is along Y, -Y end is muzzle after +90Z rot)
    const muzzleWorld = turret.barrel.localToWorld(new THREE.Vector3(0, -0.2, 0));

    const targetPos = new THREE.Vector3();
    turret.target.mesh.getWorldPosition(targetPos);
    const dir = targetPos.clone().sub(muzzleWorld).normalize();

    this._spawnProjectile({
      pos: muzzleWorld,
      dir: dir,
      speed: 36,
      color: 0x66ff88,
      glowColor: 0x33dd55,
      damage: turret.dps / turret.fireRate,
      maxLife: 1.5,
      fromShip: false,
      target: turret.target,
      length: 0.3,
    });
    this._spawnMuzzleFlash(muzzleWorld, dir, 0x88ffaa);
    this.audio.turret();
  }

  _spawnProjectile(p) {
    const tracerGeo = new THREE.CylinderGeometry(0.04, 0.04, p.length, 6);
    const tracerMat = new THREE.MeshBasicMaterial({ color: p.color });
    const tracer = new THREE.Mesh(tracerGeo, tracerMat);
    tracer.position.copy(p.pos);
    // Orient
    tracer.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), p.dir);
    this.scene.add(tracer);

    // Glow trail (sprite)
    const glowCanvas = this._glowCanvas;
    if (!this._glowCanvas) {
      const c = document.createElement('canvas');
      c.width = 64; c.height = 64;
      const ctx = c.getContext('2d');
      const grad = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
      grad.addColorStop(0, 'rgba(255,255,255,1)');
      grad.addColorStop(0.4, 'rgba(255,255,255,0.5)');
      grad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = grad; ctx.fillRect(0,0,64,64);
      this._glowCanvas = c;
      this._glowTex = new THREE.CanvasTexture(c);
    }
    const glow = new THREE.Sprite(new THREE.SpriteMaterial({
      map: this._glowTex, color: p.glowColor, transparent: true, depthWrite: false,
      blending: THREE.AdditiveBlending
    }));
    glow.scale.set(0.6, 0.6, 1);
    glow.position.copy(p.pos);
    this.scene.add(glow);

    this.projectiles.push({
      mesh: tracer,
      glow: glow,
      pos: p.pos.clone(),
      vel: p.dir.clone().multiplyScalar(p.speed),
      damage: p.damage,
      life: 0,
      maxLife: p.maxLife,
      fromShip: p.fromShip,
      target: p.target || null,
      sourceShip: p.sourceShip || null,
    });
  }

  _spawnMuzzleFlash(pos, dir, color) {
    const flash = new THREE.PointLight(color, 4, 6, 2);
    flash.position.copy(pos);
    this.scene.add(flash);
    this.particles.push({
      type: 'flash',
      mesh: flash,
      life: 0,
      maxLife: 0.08,
      startIntensity: 4,
    });
    // Sprite puff
    if (!this._flashTex) {
      const c = document.createElement('canvas');
      c.width = 64; c.height = 64;
      const ctx = c.getContext('2d');
      const grad = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
      grad.addColorStop(0, 'rgba(255,240,180,1)');
      grad.addColorStop(0.4, 'rgba(255,180,80,0.6)');
      grad.addColorStop(1, 'rgba(255,80,20,0)');
      ctx.fillStyle = grad; ctx.fillRect(0,0,64,64);
      this._flashTex = new THREE.CanvasTexture(c);
    }
    const puff = new THREE.Sprite(new THREE.SpriteMaterial({
      map: this._flashTex, color: color, transparent: true, depthWrite: false,
      blending: THREE.AdditiveBlending
    }));
    puff.position.copy(pos);
    puff.scale.set(1.2, 1.2, 1);
    this.scene.add(puff);
    this.particles.push({
      type: 'puff',
      mesh: puff,
      life: 0,
      maxLife: 0.18,
      startScale: 1.2,
      endScale: 2.6,
    });
  }

  _spawnExplosion(pos, scale, color = 0xff8833, big = false) {
    // Light burst
    const light = new THREE.PointLight(color, big ? 8 : 4, big ? 18 : 10, 2);
    light.position.copy(pos);
    this.scene.add(light);
    this.particles.push({
      type: 'flash', mesh: light,
      life: 0, maxLife: big ? 0.4 : 0.22,
      startIntensity: big ? 8 : 4,
    });

    // Expanding fireball
    if (!this._explosionTex) {
      const c = document.createElement('canvas');
      c.width = 128; c.height = 128;
      const ctx = c.getContext('2d');
      const grad = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
      grad.addColorStop(0,    'rgba(255,255,220,1)');
      grad.addColorStop(0.25, 'rgba(255,200,100,0.9)');
      grad.addColorStop(0.55, 'rgba(255,90,30,0.6)');
      grad.addColorStop(1,    'rgba(60,10,0,0)');
      ctx.fillStyle = grad; ctx.fillRect(0,0,128,128);
      this._explosionTex = new THREE.CanvasTexture(c);
    }
    const fireball = new THREE.Sprite(new THREE.SpriteMaterial({
      map: this._explosionTex, color: color, transparent: true, depthWrite: false,
      blending: THREE.AdditiveBlending
    }));
    fireball.position.copy(pos);
    fireball.scale.set(scale, scale, 1);
    this.scene.add(fireball);
    this.particles.push({
      type: 'fireball', mesh: fireball,
      life: 0, maxLife: big ? 0.9 : 0.5,
      startScale: scale, endScale: scale * (big ? 4 : 2.5),
    });

    // Shrapnel sparks
    const shardCount = big ? 24 : 10;
    for (let i = 0; i < shardCount; i++) {
      const shard = new THREE.Mesh(
        new THREE.BoxGeometry(0.06, 0.06, 0.06),
        new THREE.MeshBasicMaterial({ color: color })
      );
      shard.position.copy(pos);
      const v = new THREE.Vector3(rand(-1,1), rand(-1,1), rand(-1,1)).normalize().multiplyScalar(rand(2, big ? 8 : 4));
      this.scene.add(shard);
      this.particles.push({
        type: 'shard', mesh: shard,
        vel: v,
        life: 0, maxLife: big ? rand(0.8, 1.4) : rand(0.3, 0.7),
        rotAxis: new THREE.Vector3(rand(-1,1), rand(-1,1), rand(-1,1)).normalize(),
        rotSpeed: rand(2, 8),
      });
    }

    this.audio.explosion(big);
  }

  _damagePlanet(amount, hitPos) {
    this.state.planetHP -= amount;
    if (hitPos) {
      this._spawnExplosion(hitPos, 0.7, 0xffaa44, false);
    }
    // Resource trickle from damage dealt
    this.state.resources += Math.max(1, Math.floor(amount * 0.6));
    if (this.state.planetHP <= 0) {
      this._destroyPlanet();
    }
    this._updateHUD();
  }

  _destroyShip(ship, idx) {
    // Big explosion at ship location
    const wp = new THREE.Vector3();
    ship.mesh.getWorldPosition(wp);
    const scale = ship.cfg.length * 0.6;
    this._spawnExplosion(wp, scale, 0xffaa44, true);
    // Secondary explosions chain
    for (let i = 0; i < 3; i++) {
      const offset = new THREE.Vector3(rand(-1,1), rand(-1,1), rand(-1,1)).multiplyScalar(ship.cfg.length*0.3);
      setTimeout(() => {
        this._spawnExplosion(wp.clone().add(offset), scale*0.6, 0xff6622, false);
      }, 80 + i*100);
    }
    this.scene.remove(ship.mesh);
    ship.mesh.traverse(o => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) { if (Array.isArray(o.material)) o.material.forEach(m=>m.dispose()); else o.material.dispose(); }
    });
    this.ships.splice(idx, 1);
    this.state.fleet--;
    this._updateHUD();
    this._toast(`${ship.cfg.code} LOST`, 'warn');
  }

  _destroyTurret(turret, idx) {
    const wp = new THREE.Vector3();
    turret.mesh.getWorldPosition(wp);
    this._spawnExplosion(wp, 0.5, 0xffaa44, false);
    this.planetGroup.remove(turret.mesh);
    turret.mesh.traverse(o => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) { if (Array.isArray(o.material)) o.material.forEach(m=>m.dispose()); else o.material.dispose(); }
    });
    this.turrets.splice(idx, 1);
  }

  _destroyPlanet() {
    // Massive explosion sequence
    this.audio.victoryFanfare();
    const center = this.planetGroup.position.clone();
    for (let i = 0; i < 12; i++) {
      const offset = new THREE.Vector3(rand(-1,1), rand(-1,1), rand(-1,1)).normalize().multiplyScalar(this.planetRadius * rand(0.4, 1.0));
      setTimeout(() => {
        this._spawnExplosion(center.clone().add(offset), this.planetRadius * 0.4, 0xff6622, true);
      }, i * 90);
    }
    setTimeout(() => {
      // Big finale
      this._spawnExplosion(center, this.planetRadius * 1.6, 0xffeecc, true);
      this._spawnExplosion(center, this.planetRadius * 2.2, 0xff4422, true);
      // Reward
      const bonus = 200 * Math.pow(1.4, this.state.planetLevel - 1);
      this.state.resources += Math.floor(bonus);
      this.state.planetsDestroyed++;
      this.state.planetLevel++;
      this._toast(`PLANET DESTROYED  +${Math.floor(bonus)} SCRAP`, 'good');
      // Spawn next planet after delay
      setTimeout(() => {
        // Remove all defense projectiles in flight
        this.projectiles = this.projectiles.filter(p => {
          if (!p.fromShip) {
            this.scene.remove(p.mesh); this.scene.remove(p.glow);
            return false;
          }
          return true;
        });
        this._createPlanet(this.state.planetLevel);
        this._toast(`NEW TARGET // SECTOR ${String(this.state.planetLevel).padStart(2,'0')}`, 'good');
      }, 1400);
    }, 12 * 90 + 200);
  }

  /* ---------- UPDATE LOOPS ---------- */
  _updateShips(dt) {
    for (let i = this.ships.length - 1; i >= 0; i--) {
      const ship = this.ships[i];
      if (ship.hp <= 0) {
        this._destroyShip(ship, i);
        continue;
      }

      // Orbit motion
      ship.orbitAngle += ship.orbitSpeed * dt;
      const r = ship.orbitR;
      const baseY = Math.sin(ship.orbitTilt) * r;
      const flatR = Math.cos(ship.orbitTilt) * r;
      const x = flatR * Math.cos(ship.orbitAngle);
      const z = flatR * Math.sin(ship.orbitAngle);
      const bobY = Math.sin(this.gameTime * 0.6 + ship.bobPhase) * 0.4;
      ship.mesh.position.set(x, baseY + bobY, z);
      // Look along velocity tangent (perpendicular to radius)
      const tangent = new THREE.Vector3(-Math.sin(ship.orbitAngle), 0, Math.cos(ship.orbitAngle));
      if (ship.orbitSpeed < 0) tangent.negate();
      const lookTarget = ship.mesh.position.clone().add(tangent);
      ship.mesh.lookAt(lookTarget);
      // lookAt makes -Z face the target. Our hull is built along +X, so swing 90° to align +X with motion
      ship.mesh.rotateY(Math.PI / 2);
      // Banking around forward (+X after the swing)
      ship.mesh.rotateX(Math.sin(this.gameTime * 0.3 + ship.bobPhase) * 0.06);

      // Pulse thrusters
      if (ship.mesh.userData.thrusterGlows) {
        const p = 0.5 + 0.3 * (1 + Math.sin(this.gameTime * 14 + ship.bobPhase));
        ship.mesh.userData.thrusterGlows.forEach(g => {
          g.material.opacity = p;
          g.scale.set(1 + Math.random()*0.1, 1 + Math.random()*0.1, 1);
        });
      }

      // Turrets sway gently (planet is always below the ship in local frame, so true aim
      // tracking adds little. Cosmetic sway is enough — projectiles aim correctly at fire time).
      ship.turrets.forEach((tref, ti) => {
        tref.aim.rotation.y = Math.sin(this.gameTime * 0.7 + ti * 1.3) * 0.18;
      });

      // Fire
      ship.fireTimer -= dt;
      if (ship.fireTimer <= 0 && ship.turrets.length > 0) {
        const turret = ship.turrets[Math.floor(Math.random() * ship.turrets.length)];
        this._fireShipProjectile(ship, turret);
        ship.fireTimer = 1 / ship.fireRate;
      }
    }
  }

  _updateTurrets(dt) {
    for (let i = this.turrets.length - 1; i >= 0; i--) {
      const turret = this.turrets[i];
      if (turret.hp <= 0) {
        this._destroyTurret(turret, i);
        continue;
      }

      // Find nearest in-range ship
      let nearest = null, nearestDist = Infinity;
      const turretWorld = new THREE.Vector3();
      turret.mesh.getWorldPosition(turretWorld);
      this.ships.forEach(s => {
        const sw = new THREE.Vector3();
        s.mesh.getWorldPosition(sw);
        const d = turretWorld.distanceTo(sw);
        if (d < turret.range && d < nearestDist) {
          nearest = s; nearestDist = d;
        }
      });

      turret.target = nearest;
      if (nearest) {
        // Aim — proper yaw + pitch on the aim group (Euler order YZX so yaw applies first)
        const targetPos = new THREE.Vector3();
        nearest.mesh.getWorldPosition(targetPos);
        const localTarget = turret.mesh.worldToLocal(targetPos.clone());
        // Yaw: rotate so aim's +X (gun forward) points at target's horizontal projection.
        // After Y rotation by θ, local +X → (cosθ, 0, -sinθ). Solve for direction (x, _, z): θ = atan2(-z, x)
        const yaw = Math.atan2(-localTarget.z, localTarget.x);
        // Pitch: elevate gun upward toward target. Positive Z rotation tilts +X toward +Y.
        const horiz = Math.sqrt(localTarget.x*localTarget.x + localTarget.z*localTarget.z);
        const pitch = Math.atan2(localTarget.y, horiz);
        turret.aim.rotation.y = yaw;
        turret.aim.rotation.z = pitch;

        // Fire
        turret.fireTimer -= dt;
        if (turret.fireTimer <= 0) {
          this._fireTurretProjectile(turret);
          turret.fireTimer = 1 / turret.fireRate;
        }
      }
    }
  }

  _updateProjectiles(dt) {
    for (let i = this.projectiles.length - 1; i >= 0; i--) {
      const p = this.projectiles[i];
      p.life += dt;
      p.pos.add(p.vel.clone().multiplyScalar(dt));
      p.mesh.position.copy(p.pos);
      p.glow.position.copy(p.pos);

      let hit = false;
      // Ship-fired hits planet?
      if (p.fromShip) {
        const dToPlanet = p.pos.distanceTo(this.planetGroup.position);
        if (dToPlanet < this.planetRadius) {
          // Compute surface impact position
          const surfacePoint = p.pos.clone().sub(this.planetGroup.position).normalize().multiplyScalar(this.planetRadius * 1.01).add(this.planetGroup.position);
          this._damagePlanet(p.damage, surfacePoint);
          // Also try to damage a turret if one is close
          this.turrets.forEach(t => {
            const tw = new THREE.Vector3();
            t.mesh.getWorldPosition(tw);
            if (tw.distanceTo(surfacePoint) < 0.6) {
              t.hp -= p.damage * 0.5;
            }
          });
          this.audio.hit();
          hit = true;
        }
      } else {
        // Turret-fired hits ship?
        if (p.target && this.ships.includes(p.target)) {
          const tw = new THREE.Vector3();
          p.target.mesh.getWorldPosition(tw);
          if (p.pos.distanceTo(tw) < p.target.cfg.length * 0.5) {
            p.target.hp -= p.damage;
            this._spawnExplosion(p.pos.clone(), 0.4, 0x66ff88, false);
            this.audio.hit();
            hit = true;
          }
        }
      }

      if (hit || p.life > p.maxLife) {
        this.scene.remove(p.mesh);
        this.scene.remove(p.glow);
        p.mesh.geometry.dispose(); p.mesh.material.dispose();
        this.projectiles.splice(i, 1);
      }
    }
  }

  _updateParticles(dt) {
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];
      p.life += dt;
      const t = p.life / p.maxLife;
      if (t >= 1) {
        this.scene.remove(p.mesh);
        if (p.mesh.geometry) p.mesh.geometry.dispose();
        if (p.mesh.material) p.mesh.material.dispose();
        this.particles.splice(i, 1);
        continue;
      }
      if (p.type === 'flash') {
        p.mesh.intensity = p.startIntensity * (1 - t);
      } else if (p.type === 'fireball') {
        p.mesh.material.opacity = 1 - t;
        const s = lerp(p.startScale, p.endScale, t);
        p.mesh.scale.set(s, s, 1);
      } else if (p.type === 'puff') {
        p.mesh.material.opacity = 1 - t;
        const s = lerp(p.startScale, p.endScale, t);
        p.mesh.scale.set(s, s, 1);
      } else if (p.type === 'shard') {
        p.mesh.position.add(p.vel.clone().multiplyScalar(dt));
        p.vel.multiplyScalar(0.985); // drag
        p.mesh.rotateOnAxis(p.rotAxis, p.rotSpeed * dt);
        if (p.mesh.material) p.mesh.material.opacity = 1 - t;
        p.mesh.material.transparent = true;
      }
    }
  }

  _updateCamera(dt) {
    // Apply input
    const sens = 1.4;
    this.camState.azimuth   += this.input.stickL.x * sens * dt;
    this.camState.elevation -= this.input.stickL.y * sens * dt;
    this.camState.elevation = clamp(this.camState.elevation, -1.3, 1.3);

    // Right stick: Y zooms (desired distance), X tilts roll a bit
    this.camState.targetDistance += this.input.stickR.y * 18 * dt;
    this.camState.targetDistance = clamp(this.camState.targetDistance, 14, 70);
    this.camState.tilt = lerp(this.camState.tilt, this.input.stickR.x * 0.18, 0.06);

    // Keyboard
    if (this.input.keys['a'] || this.input.keys['ArrowLeft']) this.camState.azimuth -= 1.2 * dt;
    if (this.input.keys['d'] || this.input.keys['ArrowRight']) this.camState.azimuth += 1.2 * dt;
    if (this.input.keys['w'] || this.input.keys['ArrowUp']) this.camState.elevation += 1.2 * dt;
    if (this.input.keys['s'] || this.input.keys['ArrowDown']) this.camState.elevation -= 1.2 * dt;
    if (this.input.keys['q']) this.camState.targetDistance -= 18 * dt;
    if (this.input.keys['e']) this.camState.targetDistance += 18 * dt;
    this.camState.elevation = clamp(this.camState.elevation, -1.3, 1.3);
    this.camState.targetDistance = clamp(this.camState.targetDistance, 14, 70);

    // Smooth distance
    this.camState.distance = lerp(this.camState.distance, this.camState.targetDistance, 0.08);

    const r = this.camState.distance;
    const e = this.camState.elevation;
    const a = this.camState.azimuth;
    const x = r * Math.cos(e) * Math.sin(a);
    const y = r * Math.sin(e);
    const z = r * Math.cos(e) * Math.cos(a);

    this.camera.position.set(x, y, z);
    this.camera.lookAt(this.planetGroup.position);
    // Apply roll/tilt
    this.camera.rotateZ(this.camState.tilt);

    // Update atmosphere uniform
    if (this.atmosphere) {
      this.atmosphere.material.uniforms.viewVector.value.copy(
        new THREE.Vector3().subVectors(this.camera.position, this.atmosphere.position)
      );
    }
  }

  _passiveResources(dt) {
    // Slow trickle income
    this.state.resources += dt * (3 + this.state.planetLevel * 0.5);
  }

  /* ---------- INPUT ---------- */
  _initInput() {
    // Touch sticks
    this._setupStick('stick-left', this.input.stickL);
    this._setupStick('stick-right', this.input.stickR);

    // Mouse drag (desktop) — drag anywhere not on UI
    this.canvas.addEventListener('mousedown', e => {
      this.input.mouseDown = true;
      this.input.lastMouseX = e.clientX;
      this.input.lastMouseY = e.clientY;
    });
    window.addEventListener('mouseup', () => { this.input.mouseDown = false; });
    window.addEventListener('mousemove', e => {
      if (!this.input.mouseDown) return;
      const dx = e.clientX - this.input.lastMouseX;
      const dy = e.clientY - this.input.lastMouseY;
      this.input.lastMouseX = e.clientX;
      this.input.lastMouseY = e.clientY;
      this.camState.azimuth += dx * 0.005;
      this.camState.elevation -= dy * 0.005;
      this.camState.elevation = clamp(this.camState.elevation, -1.3, 1.3);
    });
    this.canvas.addEventListener('wheel', e => {
      e.preventDefault();
      this.camState.targetDistance += e.deltaY * 0.03;
      this.camState.targetDistance = clamp(this.camState.targetDistance, 14, 70);
    }, { passive: false });

    // Keyboard
    window.addEventListener('keydown', e => {
      this.input.keys[e.key] = true;
      if (e.key === 'Escape' || e.key === 'p' || e.key === 'P') this._togglePause();
      if (e.key === 'b' || e.key === 'B') this._openBuildMenu();
    });
    window.addEventListener('keyup', e => { this.input.keys[e.key] = false; });
  }

  _setupStick(elId, state) {
    const zone = document.getElementById(elId);
    const knob = zone.querySelector('.stick-knob');
    const radius = 50;
    const onStart = (e) => {
      e.preventDefault();
      const t = e.changedTouches ? e.changedTouches[0] : e;
      state.active = true;
      state.id = e.changedTouches ? t.identifier : 'mouse';
      state.cx = zone.getBoundingClientRect().left + zone.offsetWidth/2;
      state.cy = zone.getBoundingClientRect().top + zone.offsetHeight/2;
      onMove(e);
    };
    const onMove = (e) => {
      if (!state.active) return;
      let touch;
      if (e.changedTouches) {
        for (let i = 0; i < e.changedTouches.length; i++) {
          if (e.changedTouches[i].identifier === state.id) { touch = e.changedTouches[i]; break; }
        }
        if (!touch) return;
      } else {
        touch = e;
      }
      let dx = touch.clientX - state.cx;
      let dy = touch.clientY - state.cy;
      const d = Math.sqrt(dx*dx + dy*dy);
      if (d > radius) { dx = dx/d * radius; dy = dy/d * radius; }
      knob.style.transform = `translate(${dx}px, ${dy}px)`;
      state.x = dx / radius;
      state.y = dy / radius;
    };
    const onEnd = (e) => {
      if (!state.active) return;
      if (e.changedTouches) {
        let found = false;
        for (let i = 0; i < e.changedTouches.length; i++) {
          if (e.changedTouches[i].identifier === state.id) { found = true; break; }
        }
        if (!found) return;
      }
      state.active = false; state.id = null;
      state.x = 0; state.y = 0;
      knob.style.transform = 'translate(0,0)';
    };
    zone.addEventListener('touchstart', onStart, { passive: false });
    zone.addEventListener('touchmove', onMove, { passive: false });
    zone.addEventListener('touchend', onEnd);
    zone.addEventListener('touchcancel', onEnd);
    zone.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
  }

  /* ---------- UI ---------- */
  _initUI() {
    document.getElementById('start-btn').addEventListener('click', () => {
      this.audio.init();
      this.audio.resume();
      document.getElementById('boot').style.display = 'none';
      this.running = true;
      // Spawn 1 free starter cruiser
      this._spawnShip('cruiser');
      this.clock.start();
      this._loop();
    });

    document.getElementById('build-btn').addEventListener('click', () => this._openBuildMenu());
    document.getElementById('close-build').addEventListener('click', () => this._closeBuildMenu());
    document.getElementById('build-modal').addEventListener('click', (e) => {
      if (e.target.id === 'build-modal') this._closeBuildMenu();
    });

    document.getElementById('pause-btn').addEventListener('click', () => this._togglePause());
    document.getElementById('resume-btn').addEventListener('click', () => this._togglePause());
    document.getElementById('restart-btn').addEventListener('click', () => location.reload());

    // Boot terminal lines
    const lines = [
      '> uplink to OSC HQ ............ ESTABLISHED',
      '> stellar nav lock ............ ACQUIRED',
      '> hostile orbital target ...... CONFIRMED',
      '> shipyard available .......... CRUISER, DESTROYER, BATTLESHIP, DREADNOUGHT',
      '> standing by for command authority.'
    ];
    const term = document.getElementById('terminal');
    lines.forEach((l, i) => {
      const div = document.createElement('div');
      div.className = 'line';
      div.style.animationDelay = (0.2 + i*0.35) + 's';
      div.textContent = l;
      term.appendChild(div);
    });
  }

  _buildShipMenu() {
    const list = document.getElementById('ship-list');
    list.innerHTML = '';
    Object.values(SHIP_TIERS).forEach(cfg => {
      const card = document.createElement('div');
      card.className = 'ship-card';
      card.dataset.tier = cfg.id;
      card.innerHTML = `
        <div class="ship-icon">${cfg.code}</div>
        <div class="ship-info">
          <div class="ship-name">${cfg.name}</div>
          <div class="ship-stats">HULL ${cfg.hull} · DPS ${cfg.dps} · TURRETS ${cfg.turrets}</div>
        </div>
        <div class="ship-cost">
          <div class="num">${cfg.cost}</div>
          <div class="lbl">SCRAP</div>
        </div>
      `;
      card.addEventListener('click', () => {
        if (this.state.resources >= cfg.cost) {
          this._spawnShip(cfg.id);
          this._refreshShipMenu();
        } else {
          this._toast('INSUFFICIENT SCRAP', 'warn');
          this.audio.ui(220);
        }
      });
      list.appendChild(card);
    });
    this._refreshShipMenu();
  }

  _refreshShipMenu() {
    document.querySelectorAll('.ship-card').forEach(card => {
      const cfg = SHIP_TIERS[card.dataset.tier];
      if (this.state.resources >= cfg.cost) {
        card.classList.add('affordable'); card.classList.remove('locked');
      } else {
        card.classList.remove('affordable'); card.classList.add('locked');
      }
    });
  }

  _openBuildMenu() {
    document.getElementById('build-modal').classList.add('show');
    this._refreshShipMenu();
    this.audio.ui(880);
  }
  _closeBuildMenu() {
    document.getElementById('build-modal').classList.remove('show');
    this.audio.ui(440);
  }

  _togglePause() {
    this.paused = !this.paused;
    document.getElementById('pause-overlay').classList.toggle('show', this.paused);
    if (!this.paused) this.clock.start();
  }

  _toast(msg, kind = '') {
    const t = document.createElement('div');
    t.className = 'toast' + (kind ? ' ' + kind : '');
    t.textContent = msg;
    const wrap = document.getElementById('toasts');
    wrap.appendChild(t);
    setTimeout(() => t.remove(), 2200);
  }

  _updateHUD() {
    const pct = clamp(this.state.planetHP / this.state.planetMaxHP, 0, 1);
    document.getElementById('hp-fill').style.width = (pct*100).toFixed(1) + '%';
    document.getElementById('hp-text').textContent = `INTEGRITY: ${Math.max(0, Math.floor(pct*100))}%`;
    document.getElementById('planet-level').textContent = `SECTOR ${String(this.state.planetLevel).padStart(2,'0')} · ${this.turrets.length} BATTERIES`;
    document.getElementById('resource-val').textContent = Math.floor(this.state.resources);
    document.getElementById('fleet-val').textContent = this.state.fleet;
    // Procedural planet name
    const names = ['KEPLER-7B','VEGA-IX','ORION-3','HELIOS-PRIME','TITANIA','CYGNUS-X1','ALCYONE','RIGEL-IV','PROCYON','ATLAS-VII','POLLUX-9'];
    const name = names[(this.state.planetLevel - 1) % names.length];
    document.getElementById('planet-name').textContent = name;
  }

  _onResize() {
    this.camera.aspect = window.innerWidth / window.innerHeight;
    this.camera.updateProjectionMatrix();
    this.renderer.setSize(window.innerWidth, window.innerHeight);
  }

  /* ---------- LOOP ---------- */
  _loop() {
    requestAnimationFrame(() => this._loop());
    if (!this.running) return;
    let dt = this.clock.getDelta();
    if (this.paused) dt = 0;
    dt = Math.min(dt, 0.05); // cap big stalls
    this.gameTime += dt;

    // Slowly rotate planet
    if (this.planetGroup) this.planetGroup.rotation.y += dt * 0.04;

    if (!this.paused) {
      this._passiveResources(dt);
      this._updateShips(dt);
      this._updateTurrets(dt);
      this._updateProjectiles(dt);
      this._updateParticles(dt);
    }
    this._updateCamera(dt);

    // Periodic HUD refresh (cheap)
    if (Math.floor(this.gameTime * 4) !== this._lastHudTick) {
      this._lastHudTick = Math.floor(this.gameTime * 4);
      this._updateHUD();
      this._refreshShipMenu();
    }

    // Rotate starfield very slowly opposite camera for parallax illusion
    if (this.starfield) {
      this.starfield.rotation.y -= dt * 0.003;
    }

    this.renderer.render(this.scene, this.camera);
  }
}

// Boot
window.addEventListener('load', () => {
  window.game = new Game();
});
</script>
