<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>DREADSPACE — Orbital Siege Command</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --amber: #ffaa33;
    --amber-bright: #ffcc66;
    --amber-dim: #8a5a1a;
    --olive: #4a5d23;
    --olive-dark: #2a3a14;
    --red: #ff3344;
    --green: #66ff88;
    --steel: #6a7280;
    --bg: #000;
    --panel: rgba(8, 12, 6, 0.78);
    --panel-edge: rgba(255, 170, 51, 0.45);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #000;
    color: var(--amber);
    font-family: 'Share Tech Mono', monospace;
    user-select: none; -webkit-user-select: none;
    touch-action: none; overscroll-behavior: none;
  }
  body { position: fixed; inset: 0; }
  canvas { position: absolute; inset: 0; display: block; }

  /* ===== HUD overlay ===== */
  #hud { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
  #hud > * { pointer-events: auto; }

  /* CRT scanlines + vignette */
  #hud::before {
    content: ''; position: absolute; inset: 0;
    background:
      repeating-linear-gradient(to bottom,
        rgba(0,0,0,0) 0px,
        rgba(0,0,0,0) 2px,
        rgba(0,0,0,0.18) 3px,
        rgba(0,0,0,0) 4px);
    pointer-events: none;
    mix-blend-mode: multiply;
    z-index: 1;
  }
  #hud::after {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
    pointer-events: none; z-index: 1;
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    border-radius: 2px;
    box-shadow:
      0 0 20px rgba(255,170,51,0.10),
      inset 0 0 30px rgba(255,170,51,0.04);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
  }
  .corner {
    position: relative;
  }
  .corner::before, .corner::after {
    content: ''; position: absolute; width: 8px; height: 8px;
    border-color: var(--amber);
    border-style: solid;
  }
  .corner::before { top: -1px; left: -1px; border-width: 1px 0 0 1px; }
  .corner::after  { bottom: -1px; right: -1px; border-width: 0 1px 1px 0; }

  /* ===== Top status bar ===== */
  #top-bar {
    position: absolute; top: env(safe-area-inset-top, 0); left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 10px 12px;
    gap: 8px;
    z-index: 12;
  }
  #planet-status {
    flex: 1; max-width: 320px;
    padding: 8px 12px;
  }
  #planet-status .label { font-size: 9px; letter-spacing: 0.18em; color: var(--amber-dim); margin-bottom: 4px; }
  #planet-status .name { font-family: 'Black Ops One', sans-serif; font-size: 16px; color: var(--amber-bright); letter-spacing: 0.1em; line-height: 1; }
  #planet-status .level { font-size: 10px; color: var(--amber); margin-top: 2px; letter-spacing: 0.15em; }
  #hp-bar {
    margin-top: 8px; height: 10px; width: 100%;
    background: rgba(0,0,0,0.6); border: 1px solid var(--amber-dim);
    position: relative; overflow: hidden;
  }
  #hp-fill {
    height: 100%; width: 100%;
    background: linear-gradient(90deg, #ff3344 0%, #ff8833 50%, #ffcc44 100%);
    transition: width 0.18s ease-out;
    box-shadow: 0 0 8px rgba(255,80,40,0.6);
  }
  #hp-text { font-size: 9px; margin-top: 3px; color: var(--amber); letter-spacing: 0.1em; }

  #right-stats {
    display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
  }
  .stat-pill {
    padding: 6px 10px;
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; letter-spacing: 0.12em;
    min-width: 110px; justify-content: space-between;
  }
  .stat-pill .label { font-size: 9px; color: var(--amber-dim); }
  .stat-pill .val { font-family: 'Black Ops One', sans-serif; color: var(--amber-bright); font-size: 14px; }
  #pause-btn {
    width: 38px; height: 38px;
    background: var(--panel); border: 1px solid var(--panel-edge);
    color: var(--amber); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; padding: 0;
  }
  #pause-btn:active { background: rgba(255,170,51,0.15); }

  /* ===== Build button ===== */
  #build-btn {
    position: absolute;
    bottom: calc(env(safe-area-inset-bottom, 0) + 14px);
    left: 50%; transform: translateX(-50%);
    padding: 10px 22px;
    background: linear-gradient(180deg, rgba(74,93,35,0.85), rgba(42,58,20,0.92));
    border: 1px solid var(--amber);
    color: var(--amber-bright);
    font-family: 'Black Ops One', sans-serif;
    font-size: 14px; letter-spacing: 0.18em;
    cursor: pointer; z-index: 12;
    box-shadow:
      0 0 20px rgba(255,170,51,0.25),
      inset 0 0 12px rgba(0,0,0,0.4);
  }
  #build-btn:active { transform: translateX(-50%) scale(0.96); background: rgba(255,170,51,0.2); }

  /* ===== Thumbsticks ===== */
  .stick-zone {
    position: absolute;
    bottom: calc(env(safe-area-inset-bottom, 0) + 70px);
    width: 130px; height: 130px;
    z-index: 11;
    touch-action: none;
  }
  #stick-left { left: 14px; }
  #stick-right { right: 14px; }
  .stick-base {
    position: absolute; inset: 0;
    border-radius: 50%;
    border: 1px dashed rgba(255,170,51,0.3);
    background: radial-gradient(circle, rgba(255,170,51,0.05), rgba(0,0,0,0.3));
    opacity: 0.6;
    pointer-events: none;
  }
  .stick-knob {
    position: absolute; top: 50%; left: 50%;
    width: 56px; height: 56px;
    margin: -28px 0 0 -28px;
    border-radius: 50%;
    border: 1px solid var(--amber);
    background: radial-gradient(circle at 30% 30%, rgba(255,200,80,0.4), rgba(255,170,51,0.12) 60%, rgba(0,0,0,0.5));
    box-shadow: 0 0 12px rgba(255,170,51,0.4), inset 0 0 8px rgba(0,0,0,0.5);
    pointer-events: none;
    transition: transform 0.05s linear;
  }
  .stick-label {
    position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
    font-size: 9px; color: var(--amber-dim);
    letter-spacing: 0.2em; white-space: nowrap;
    pointer-events: none;
  }

  /* ===== Build menu modal ===== */
  .modal-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.7);
    display: none; align-items: center; justify-content: center;
    z-index: 30; padding: 20px;
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  }
  .modal-overlay.show { display: flex; }
  .modal {
    width: 100%; max-width: 420px; max-height: 90vh; overflow-y: auto;
    padding: 16px;
  }
  .modal-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 14px; padding-bottom: 10px;
    border-bottom: 1px solid var(--amber-dim);
  }
  .modal-title {
    font-family: 'Black Ops One', sans-serif;
    font-size: 18px; color: var(--amber-bright); letter-spacing: 0.15em;
  }
  .close-btn {
    background: transparent; border: 1px solid var(--amber-dim);
    color: var(--amber); width: 32px; height: 32px;
    cursor: pointer; font-size: 16px;
  }

  .ship-card {
    margin-bottom: 10px; padding: 10px 12px;
    border: 1px solid rgba(255,170,51,0.25);
    background: rgba(20,16,8,0.5);
    display: flex; gap: 12px; align-items: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .ship-card:active { background: rgba(255,170,51,0.1); }
  .ship-card.locked { opacity: 0.45; cursor: not-allowed; }
  .ship-card.affordable { border-color: var(--amber); box-shadow: inset 0 0 10px rgba(255,170,51,0.08); }
  .ship-icon {
    flex-shrink: 0;
    width: 56px; height: 36px;
    background: linear-gradient(135deg, var(--olive), var(--olive-dark));
    border: 1px solid var(--amber-dim);
    position: relative;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Black Ops One', sans-serif; font-size: 9px;
    color: var(--amber-bright); letter-spacing: 0.1em;
  }
  .ship-info { flex: 1; min-width: 0; }
  .ship-name { font-family: 'Black Ops One', sans-serif; font-size: 13px; color: var(--amber-bright); letter-spacing: 0.12em; }
  .ship-stats { font-size: 10px; color: var(--amber-dim); margin-top: 3px; letter-spacing: 0.06em; }
  .ship-cost { flex-shrink: 0; text-align: right; }
  .ship-cost .num { font-family: 'Black Ops One', sans-serif; font-size: 14px; color: var(--amber-bright); }
  .ship-cost .lbl { font-size: 9px; color: var(--amber-dim); letter-spacing: 0.1em; }

  /* ===== Boot/title screen ===== */
  #boot {
    position: absolute; inset: 0;
    background: #000;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 50;
    text-align: center; padding: 20px;
  }
  #boot h1 {
    font-family: 'Black Ops One', sans-serif;
    font-size: clamp(36px, 9vw, 72px);
    letter-spacing: 0.18em;
    color: var(--amber-bright);
    text-shadow:
      0 0 20px rgba(255,170,51,0.6),
      0 0 40px rgba(255,80,20,0.3);
    margin-bottom: 8px;
  }
  #boot .subtitle {
    font-size: 11px; color: var(--amber-dim);
    letter-spacing: 0.3em; margin-bottom: 30px;
  }
  #boot .terminal {
    font-size: 11px; color: var(--green);
    letter-spacing: 0.06em;
    text-align: left; margin-bottom: 30px;
    max-width: 320px; min-height: 80px;
  }
  #boot .terminal .line { opacity: 0; animation: lineIn 0.4s forwards; }
  @keyframes lineIn { to { opacity: 1; } }
  #start-btn {
    padding: 14px 36px;
    background: linear-gradient(180deg, rgba(74,93,35,0.95), rgba(42,58,20,0.95));
    border: 1px solid var(--amber);
    color: var(--amber-bright);
    font-family: 'Black Ops One', sans-serif;
    font-size: 16px; letter-spacing: 0.2em;
    cursor: pointer;
    box-shadow: 0 0 24px rgba(255,170,51,0.4);
    animation: pulseBtn 2s ease-in-out infinite;
  }
  #start-btn:disabled {
    cursor: wait;
    opacity: 0.55;
    animation: none;
    box-shadow: none;
    border-color: rgba(255,170,51,0.3);
    color: rgba(255,170,51,0.7);
  }
  @keyframes pulseBtn {
    0%, 100% { box-shadow: 0 0 24px rgba(255,170,51,0.4); }
    50%      { box-shadow: 0 0 36px rgba(255,170,51,0.7); }
  }

  /* ===== Ship inspect card (floating, screen-space) ===== */
  #ship-card {
    position: absolute;
    z-index: 30;
    width: 220px;
    background: rgba(8, 12, 6, 0.92);
    border: 1px solid var(--amber);
    box-shadow: 0 0 22px rgba(255,170,51,0.35), inset 0 0 14px rgba(255,170,51,0.08);
    padding: 12px 14px 10px;
    color: var(--amber-bright);
    font-size: 11px; letter-spacing: 0.06em;
    pointer-events: auto;
    display: none;
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    transform: translate(-50%, -100%);  /* anchored above ship */
  }
  #ship-card.show { display: block; animation: cardIn 0.2s ease-out; }
  @keyframes cardIn { from { opacity:0; transform: translate(-50%, -90%); } to { opacity:1; transform: translate(-50%, -100%); } }
  #ship-card-close {
    position: absolute; top: 4px; right: 6px;
    background: none; border: none; color: var(--amber-dim);
    font-size: 14px; cursor: pointer; padding: 2px 6px;
  }
  #ship-card-close:active { color: var(--amber-bright); }
  #ship-card .card-code {
    font-family: 'Black Ops One', sans-serif;
    font-size: 10px; letter-spacing: 0.18em;
    color: var(--amber-dim);
  }
  #ship-card .card-name {
    font-family: 'Black Ops One', sans-serif;
    font-size: 16px; letter-spacing: 0.12em;
    color: var(--amber-bright);
    margin-bottom: 8px;
  }
  #ship-card .card-row {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 8px;
  }
  #ship-card .card-lbl {
    font-size: 9px; letter-spacing: 0.12em;
    color: var(--amber-dim);
    width: 32px;
  }
  #ship-card .card-bar {
    flex: 1; height: 8px;
    background: rgba(255,170,51,0.1);
    border: 1px solid var(--amber-dim);
    overflow: hidden;
  }
  #ship-card .card-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--amber), #ffcc66);
    transition: width 0.25s;
  }
  #ship-card .card-num {
    font-size: 9px; color: var(--amber-bright);
    min-width: 56px; text-align: right;
  }
  #ship-card .card-stats {
    font-size: 10px; color: var(--amber-dim);
    line-height: 1.6; margin-bottom: 10px;
    border-top: 1px solid rgba(255,170,51,0.2);
    padding-top: 6px;
  }
  #ship-card .card-stats span {
    color: var(--amber-bright);
  }
  #ship-card-bridge {
    width: 100%;
    padding: 8px;
    background: linear-gradient(180deg, rgba(74,93,35,0.6), rgba(42,58,20,0.6));
    border: 1px solid var(--amber);
    color: var(--amber-bright);
    font-family: 'Black Ops One', sans-serif;
    font-size: 11px; letter-spacing: 0.18em;
    cursor: pointer;
  }
  #ship-card-bridge:active { background: rgba(255,170,51,0.2); }

  /* ===== Bridge view UI ===== */
  #exit-bridge-btn {
    position: absolute;
    top: 14px; left: 50%; transform: translateX(-50%);
    z-index: 35;
    padding: 10px 22px;
    background: rgba(8, 12, 6, 0.92);
    border: 1px solid var(--amber);
    color: var(--amber-bright);
    font-family: 'Black Ops One', sans-serif;
    font-size: 11px; letter-spacing: 0.2em;
    box-shadow: 0 0 18px rgba(255,170,51,0.4);
    cursor: pointer;
    display: none;
  }
  #exit-bridge-btn.show { display: block; }
  #exit-bridge-btn:active { background: rgba(255,170,51,0.15); }
  #bridge-marker {
    position: absolute;
    bottom: 14px; left: 50%; transform: translateX(-50%);
    z-index: 35;
    color: var(--amber);
    font-family: 'Black Ops One', sans-serif;
    font-size: 10px; letter-spacing: 0.3em;
    text-shadow: 0 0 12px rgba(255,170,51,0.6);
    display: none;
    animation: pulseFade 2s ease-in-out infinite;
  }
  #bridge-marker.show { display: block; }
  @keyframes pulseFade {
    0%, 100% { opacity: 0.45; }
    50%      { opacity: 1.0; }
  }

  /* ===== Pause overlay ===== */
  #pause-overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.85);
    display: none; flex-direction: column; align-items: center; justify-content: center;
    z-index: 40; gap: 14px;
    backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
  }
  #pause-overlay.show { display: flex; }
  #pause-overlay h2 {
    font-family: 'Black Ops One', sans-serif; font-size: 36px;
    color: var(--amber-bright); letter-spacing: 0.25em;
    text-shadow: 0 0 20px rgba(255,170,51,0.6);
  }
  #pause-overlay button {
    padding: 10px 28px; min-width: 160px;
    background: var(--panel); border: 1px solid var(--amber);
    color: var(--amber-bright); font-family: 'Black Ops One', sans-serif;
    font-size: 13px; letter-spacing: 0.18em; cursor: pointer;
  }
  #pause-overlay button:active { background: rgba(255,170,51,0.2); }

  /* ===== Toast notifications ===== */
  #toasts {
    position: absolute;
    top: calc(env(safe-area-inset-top, 0) + 90px);
    left: 50%; transform: translateX(-50%);
    z-index: 25; pointer-events: none;
    display: flex; flex-direction: column; gap: 4px; align-items: center;
  }
  .toast {
    padding: 6px 14px;
    background: rgba(0,0,0,0.7); border: 1px solid var(--amber-dim);
    color: var(--amber-bright);
    font-size: 11px; letter-spacing: 0.15em;
    animation: toastIn 0.3s ease-out, toastOut 0.4s ease-in 1.6s forwards;
  }
  .toast.warn { border-color: var(--red); color: var(--red); }
  .toast.good { border-color: var(--green); color: var(--green); }
  @keyframes toastIn  { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes toastOut { to   { opacity: 0; transform: translateY(-8px); } }

  /* Hide stick UI on non-touch devices */
  @media (hover: hover) and (pointer: fine) {
    .stick-zone { display: none; }
  }

  /* Compact for small screens */
  @media (max-height: 600px) {
    .stick-zone { width: 110px; height: 110px; bottom: calc(env(safe-area-inset-bottom, 0) + 50px); }
    .stick-knob { width: 46px; height: 46px; margin: -23px 0 0 -23px; }
    #build-btn { bottom: calc(env(safe-area-inset-bottom, 0) + 8px); padding: 8px 18px; font-size: 12px; }
  }
</style>
</head>
<body>

<canvas id="scene"></canvas>

<!-- HUD overlay -->
<div id="hud">
  <div id="top-bar">
    <div id="planet-status" class="panel corner">
      <div class="label">TARGET // ORBITAL CONTACT</div>
      <div class="name" id="planet-name">KEPLER-7B</div>
      <div class="level" id="planet-level">SECTOR 01</div>
      <div id="hp-bar"><div id="hp-fill"></div></div>
      <div id="hp-text">INTEGRITY: 100%</div>
    </div>
    <div id="right-stats">
      <div class="stat-pill panel corner">
        <span class="label">SCRAP</span><span class="val" id="resource-val">100</span>
      </div>
      <div class="stat-pill panel corner">
        <span class="label">FLEET</span><span class="val" id="fleet-val">0</span>
      </div>
      <button id="pause-btn" class="corner" aria-label="Pause">II</button>
    </div>
  </div>

  <div id="toasts"></div>

  <button id="build-btn">⚒ COMMISSION VESSEL</button>

  <div id="stick-left" class="stick-zone">
    <div class="stick-label">ORBIT</div>
    <div class="stick-base"></div>
    <div class="stick-knob"></div>
  </div>
  <div id="stick-right" class="stick-zone">
    <div class="stick-label">RANGE / TILT</div>
    <div class="stick-base"></div>
    <div class="stick-knob"></div>
  </div>
</div>

<!-- Build menu -->
<div id="build-modal" class="modal-overlay">
  <div class="modal panel corner">
    <div class="modal-header">
      <div class="modal-title">SHIPYARD // ORDNANCE</div>
      <button class="close-btn" id="close-build">✕</button>
    </div>
    <div id="ship-list"></div>
  </div>
</div>

<!-- Pause -->
<div id="pause-overlay">
  <h2>// PAUSED //</h2>
  <button id="resume-btn">RESUME</button>
  <button id="restart-btn">RESTART CAMPAIGN</button>
</div>

<!-- Ship inspect card (floats in screen-space near tapped ship) -->
<div id="ship-card">
  <button id="ship-card-close" aria-label="Close">✕</button>
  <div class="card-code" id="ship-card-code">CR-1</div>
  <div class="card-name" id="ship-card-name">CRUISER</div>
  <div class="card-row">
    <span class="card-lbl">HULL</span>
    <div class="card-bar"><div class="card-fill" id="ship-card-hp"></div></div>
    <span class="card-num" id="ship-card-hp-num">220/220</span>
  </div>
  <div class="card-stats" id="ship-card-stats"></div>
  <button id="ship-card-bridge">▣ VIEW FROM BRIDGE</button>
</div>

<!-- Bridge view exit -->
<button id="exit-bridge-btn">↩ EXIT BRIDGE</button>
<div id="bridge-marker">// BRIDGE VIEW //</div>

<!-- Boot screen -->
<div id="boot">
  <h1>DREADSPACE</h1>
  <div class="subtitle">// ORBITAL SIEGE COMMAND //</div>
  <div class="terminal" id="terminal"></div>
  <button id="start-btn">▶ INITIATE ASSAULT</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://unpkg.com/three@0.128.0/examples/js/loaders/DRACOLoader.js"></script>
<script>
'use strict';

/* ============================================================
 * DREADSPACE — Orbital Siege Command
 * Single-file HTML5 / Three.js space combat game
 * ============================================================ */

const TAU = Math.PI * 2;
const lerp = (a,b,t) => a + (b-a)*t;
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
const rand = (a,b) => a + Math.random()*(b-a);
const randSign = () => Math.random() < 0.5 ? -1 : 1;

/* ============================================================
 * AUDIO ENGINE — fully procedural Web Audio synth
 * ============================================================ */
class AudioEngine {
  constructor() {
    this.ctx = null;
    this.master = null;
    this.muted = false;
    this.lastBoom = 0;
    // Sample storage. We pre-fetch the bytes early; decode happens after AudioContext exists.
    this._samples = {};                 // { name: AudioBuffer }
    this._sampleArrayBuffers = {};      // { name: ArrayBuffer } — pending decode
  }

  // Fetch sample bytes early. Safe to call before init() — bytes are buffered, not decoded yet.
  preloadSamples(urls) {
    Object.entries(urls).forEach(([name, url]) => {
      fetch(url)
        .then(r => r.ok ? r.arrayBuffer() : Promise.reject(new Error(`HTTP ${r.status}`)))
        .then(ab => {
          this._sampleArrayBuffers[name] = ab;
          // If AudioContext already exists (rare ordering), decode immediately
          if (this.ctx && !this._samples[name]) this._decodeOne(name);
        })
        .catch(err => console.warn(`Audio sample load failed: ${url}`, err));
    });
  }

  async _decodeOne(name) {
    const ab = this._sampleArrayBuffers[name];
    if (!ab) return;
    try {
      // .slice(0) clones — decodeAudioData detaches its input on some browsers
      this._samples[name] = await this.ctx.decodeAudioData(ab.slice(0));
    } catch (e) {
      console.warn(`Audio decode failed: ${name}`, e);
    }
  }

  _decodeAllPending() {
    Object.keys(this._sampleArrayBuffers).forEach(name => {
      if (!this._samples[name]) this._decodeOne(name);
    });
  }

  init() {
    if (this.ctx) return;
    const Ctx = window.AudioContext || window.webkitAudioContext;
    this.ctx = new Ctx();
    this.master = this.ctx.createGain();
    this.master.gain.value = 0.55;
    this.master.connect(this.ctx.destination);
    this._startAmbient();
    // Decode any samples we already have bytes for
    this._decodeAllPending();
  }
  resume() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); }

  _startAmbient() {
    const ctx = this.ctx;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    const filter = ctx.createBiquadFilter();
    osc.type = 'sawtooth';
    osc.frequency.value = 42;
    filter.type = 'lowpass';
    filter.frequency.value = 110;
    gain.gain.value = 0.05;
    osc.connect(filter); filter.connect(gain); gain.connect(this.master);
    osc.start();
    // Slow LFO on filter
    const lfo = ctx.createOscillator();
    const lfoGain = ctx.createGain();
    lfo.frequency.value = 0.07;
    lfoGain.gain.value = 30;
    lfo.connect(lfoGain); lfoGain.connect(filter.frequency);
    lfo.start();
  }

  _noiseBuffer(seconds = 1) {
    const sr = this.ctx.sampleRate;
    const buf = this.ctx.createBuffer(1, sr*seconds, sr);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random()*2 - 1;
    return buf;
  }

  // Big cannon boom — uses the cannon.mp3 sample if loaded, with tier-aware processing:
  // pitch-down (deeper), low-shelf boost (deeper), high-shelf nudge (sharper),
  // gain boost (louder), plus a parallel sub-bass thump for heavies (the felt kick).
  // Falls back to the multi-layer synth if the sample hasn't decoded yet.
  cannon(strength = 1, tier = 1) {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    if (t - this.lastBoom < 0.015) return;
    this.lastBoom = t;

    if (this._samples.cannon) {
      this._cannonSample(t, strength, tier);
    } else {
      this._cannonSynth(t, strength, tier);
    }
  }

  _cannonSample(t, strength, tier) {
    // Per-tier processing recipe.
    // rate < 1 = pitched down (deeper, longer). shelfLow boosts <200Hz body.
    // shelfHi nudges 4kHz+ for transient sharpness. sub adds a parallel sine kick.
    const cfg = ({
      1: { rate: 1.00, gain: 0.85, shelfLow: 0,  shelfHi: 0,  sub: 0,    subFreq: 60, subLen: 0.20 },
      2: { rate: 0.96, gain: 1.00, shelfLow: 3,  shelfHi: 1,  sub: 0,    subFreq: 55, subLen: 0.22 },
      3: { rate: 0.84, gain: 1.30, shelfLow: 7,  shelfHi: 3,  sub: 0.65, subFreq: 45, subLen: 0.36 },
      4: { rate: 0.74, gain: 1.55, shelfLow: 10, shelfHi: 4,  sub: 0.95, subFreq: 36, subLen: 0.55 },
    })[tier] || { rate: 1.0, gain: 0.85, shelfLow: 0, shelfHi: 0, sub: 0, subFreq: 60, subLen: 0 };

    // ---- Main sample with EQ chain ----
    const src = this.ctx.createBufferSource();
    src.buffer = this._samples.cannon;
    src.playbackRate.value = cfg.rate;

    const lowShelf = this.ctx.createBiquadFilter();
    lowShelf.type = 'lowshelf';
    lowShelf.frequency.value = 200;
    lowShelf.gain.value = cfg.shelfLow;

    const highShelf = this.ctx.createBiquadFilter();
    highShelf.type = 'highshelf';
    highShelf.frequency.value = 3500;
    highShelf.gain.value = cfg.shelfHi;

    const gain = this.ctx.createGain();
    gain.gain.value = cfg.gain * strength;

    src.connect(lowShelf);
    lowShelf.connect(highShelf);
    highShelf.connect(gain);
    gain.connect(this.master);
    src.start(t);

    // ---- Parallel sub-bass kick (heavies only) ----
    // Adds the felt, chest-thump low end that mp3 mid-fi recordings often lack.
    if (cfg.sub > 0) {
      const osc = this.ctx.createOscillator();
      const og = this.ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(cfg.subFreq, t);
      osc.frequency.exponentialRampToValueAtTime(20, t + cfg.subLen);
      og.gain.setValueAtTime(0.0001, t);
      og.gain.exponentialRampToValueAtTime(cfg.sub * strength, t + 0.008);
      og.gain.exponentialRampToValueAtTime(0.0001, t + cfg.subLen);
      osc.connect(og);
      og.connect(this.master);
      osc.start(t);
      osc.stop(t + cfg.subLen + 0.05);
    }
  }

  _cannonSynth(t, strength, tier) {
    // Multi-layer synth fallback (used while cannon.mp3 is still decoding, or if missing).
    const tierBoost = 1 + (tier - 1) * 0.18;
    const amp = strength * tierBoost;

    // ---- Layer 1: sub-bass thump (the felt punch) ----
    {
      const osc = this.ctx.createOscillator();
      const og = this.ctx.createGain();
      osc.type = 'sine';
      const startF = 220 - tier * 25;
      osc.frequency.setValueAtTime(startF, t);
      osc.frequency.exponentialRampToValueAtTime(28, t + 0.22 + tier * 0.04);
      og.gain.setValueAtTime(0.0001, t);
      og.gain.exponentialRampToValueAtTime(0.85 * amp, t + 0.005);
      og.gain.exponentialRampToValueAtTime(0.0001, t + 0.40 + tier * 0.05);
      osc.connect(og); og.connect(this.master);
      osc.start(t); osc.stop(t + 0.5 + tier * 0.06);
    }

    // ---- Layer 2: muzzle crack (filtered noise burst) ----
    {
      const noise = this.ctx.createBufferSource();
      noise.buffer = this._noiseBuffer(0.35);
      const f1 = this.ctx.createBiquadFilter();
      f1.type = 'bandpass';
      f1.frequency.setValueAtTime(2000 - tier * 200, t);
      f1.frequency.exponentialRampToValueAtTime(400, t + 0.15);
      f1.Q.value = 0.6;
      const ng = this.ctx.createGain();
      ng.gain.setValueAtTime(0.55 * amp, t);
      ng.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
      noise.connect(f1); f1.connect(ng); ng.connect(this.master);
      noise.start(t);
    }

    // ---- Layer 3: low-mid body ----
    {
      const osc = this.ctx.createOscillator();
      const og = this.ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.setValueAtTime(110, t);
      osc.frequency.exponentialRampToValueAtTime(55, t + 0.18);
      og.gain.setValueAtTime(0.0001, t);
      og.gain.exponentialRampToValueAtTime(0.35 * amp, t + 0.008);
      og.gain.exponentialRampToValueAtTime(0.0001, t + 0.28);
      osc.connect(og); og.connect(this.master);
      osc.start(t); osc.stop(t + 0.35);
    }

    // ---- Layer 4: shell whistle for heavies ----
    if (tier >= 3) {
      const osc = this.ctx.createOscillator();
      const og = this.ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(900, t + 0.05);
      osc.frequency.exponentialRampToValueAtTime(450, t + 0.55);
      og.gain.setValueAtTime(0.0001, t + 0.05);
      og.gain.exponentialRampToValueAtTime(0.08 * amp, t + 0.10);
      og.gain.exponentialRampToValueAtTime(0.0001, t + 0.6);
      osc.connect(og); og.connect(this.master);
      osc.start(t + 0.05); osc.stop(t + 0.65);
    }
  }

  // Volley fire — for big ships. Plays a bigger cannon for the "anchor" gun
  // then several quick echoes simulating the multi-barrel salvo.
  volley(tier = 4) {
    this.cannon(1.4, tier);
  }

  // Smaller defense turret pop
  turret() {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(420, t);
    osc.frequency.exponentialRampToValueAtTime(120, t + 0.08);
    gain.gain.setValueAtTime(0.18, t);
    gain.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);
    osc.connect(gain); gain.connect(this.master);
    osc.start(t); osc.stop(t + 0.15);
  }

  // Shell impact — heavy thud + dirt-splash. Used for ship shots hitting planet.
  hit(big = false) {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    // Sub-thud
    {
      const osc = this.ctx.createOscillator();
      const og = this.ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(140, t);
      osc.frequency.exponentialRampToValueAtTime(35, t + 0.18);
      og.gain.setValueAtTime(0.0001, t);
      og.gain.exponentialRampToValueAtTime(big ? 0.6 : 0.35, t + 0.005);
      og.gain.exponentialRampToValueAtTime(0.0001, t + 0.30);
      osc.connect(og); og.connect(this.master);
      osc.start(t); osc.stop(t + 0.35);
    }
    // Dirt/debris splash
    {
      const noise = this.ctx.createBufferSource();
      noise.buffer = this._noiseBuffer(0.20);
      const f = this.ctx.createBiquadFilter();
      f.type = 'lowpass';
      f.frequency.setValueAtTime(1800, t);
      f.frequency.exponentialRampToValueAtTime(300, t + 0.18);
      const g = this.ctx.createGain();
      g.gain.setValueAtTime(big ? 0.5 : 0.28, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.20);
      noise.connect(f); f.connect(g); g.connect(this.master);
      noise.start(t);
    }
  }

  // Defense-turret hit on a ship — sharper, metal sparks.
  shipHit() {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const noise = this.ctx.createBufferSource();
    noise.buffer = this._noiseBuffer(0.16);
    const f = this.ctx.createBiquadFilter();
    f.type = 'bandpass'; f.frequency.value = 3200; f.Q.value = 1.8;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.20, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.14);
    noise.connect(f); f.connect(g); g.connect(this.master);
    noise.start(t);
    // Plus a small low thump
    const osc = this.ctx.createOscillator();
    const og = this.ctx.createGain();
    osc.type = 'sine'; osc.frequency.value = 220;
    og.gain.setValueAtTime(0.18, t);
    og.gain.exponentialRampToValueAtTime(0.0001, t + 0.10);
    osc.connect(og); og.connect(this.master);
    osc.start(t); osc.stop(t + 0.12);
  }

  explosion(big = false) {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    if (this._samples.explosion) {
      this._explosionSample(t, big);
    } else {
      this._explosionSynth(t, big);
    }
  }

  _explosionSample(t, big) {
    // Main sample
    const src = this.ctx.createBufferSource();
    src.buffer = this._samples.explosion;
    src.playbackRate.value = big ? 0.78 : 1.0;       // pitch down for big explosions = bigger feel
    const lowShelf = this.ctx.createBiquadFilter();
    lowShelf.type = 'lowshelf';
    lowShelf.frequency.value = 180;
    lowShelf.gain.value = big ? 8 : 2;
    const gain = this.ctx.createGain();
    gain.gain.value = big ? 1.4 : 0.85;
    src.connect(lowShelf); lowShelf.connect(gain); gain.connect(this.master);
    src.start(t);

    // Parallel sub-bass kick — gives big explosions the felt "WHUMP"
    if (big) {
      const osc = this.ctx.createOscillator();
      const og = this.ctx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(70, t);
      osc.frequency.exponentialRampToValueAtTime(22, t + 0.55);
      og.gain.setValueAtTime(0.0001, t);
      og.gain.exponentialRampToValueAtTime(0.85, t + 0.012);
      og.gain.exponentialRampToValueAtTime(0.0001, t + 0.6);
      osc.connect(og); og.connect(this.master);
      osc.start(t); osc.stop(t + 0.7);
    }
  }

  _explosionSynth(t, big) {
    const dur = big ? 0.9 : 0.45;
    // Sub thud
    const osc = this.ctx.createOscillator();
    const og = this.ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(big ? 90 : 130, t);
    osc.frequency.exponentialRampToValueAtTime(25, t + dur*0.6);
    og.gain.setValueAtTime(0.0001, t);
    og.gain.exponentialRampToValueAtTime(big ? 1.0 : 0.55, t + 0.01);
    og.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.connect(og); og.connect(this.master);
    osc.start(t); osc.stop(t + dur + 0.05);
    // Noise blast
    const noise = this.ctx.createBufferSource();
    noise.buffer = this._noiseBuffer(dur);
    const nf = this.ctx.createBiquadFilter();
    nf.type = 'lowpass';
    nf.frequency.setValueAtTime(big ? 3000 : 1800, t);
    nf.frequency.exponentialRampToValueAtTime(120, t + dur);
    const ng = this.ctx.createGain();
    ng.gain.setValueAtTime(big ? 0.7 : 0.4, t);
    ng.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    noise.connect(nf); nf.connect(ng); ng.connect(this.master);
    noise.start(t);
  }

  ui(freq = 880) {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    osc.type = 'triangle'; osc.frequency.value = freq;
    g.gain.setValueAtTime(0.18, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);
    osc.connect(g); g.connect(this.master);
    osc.start(t); osc.stop(t + 0.15);
  }

  victoryFanfare() {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const notes = [330, 415, 494, 660];
    notes.forEach((f, i) => {
      const osc = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      osc.type = 'sawtooth'; osc.frequency.value = f;
      const startT = t + i*0.12;
      g.gain.setValueAtTime(0.0001, startT);
      g.gain.exponentialRampToValueAtTime(0.22, startT + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, startT + 0.5);
      const filter = this.ctx.createBiquadFilter();
      filter.type = 'lowpass'; filter.frequency.value = 1500;
      osc.connect(filter); filter.connect(g); g.connect(this.master);
      osc.start(startT); osc.stop(startT + 0.55);
    });
  }
}
